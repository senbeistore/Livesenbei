<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>iOPEN 出貨明細解析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f9f6f2;color:#1a1a1a;min-height:100vh}
header{background:#8B1A1A;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
header h1{font-size:16px;font-weight:700;flex:1}
header a{color:rgba(255,255,255,0.8);font-size:12px;text-decoration:none;padding:4px 8px;border:1px solid rgba(255,255,255,0.3);border-radius:6px}
.wrap{padding:14px;max-width:900px;margin:0 auto}
.drop{background:#fff;border:2px dashed #d4b9a0;border-radius:14px;text-align:center;padding:28px 16px;cursor:pointer;transition:border-color .2s;display:block}
.drop:active,.drop.drag{border-color:#8B1A1A;background:#fdf8f5}
.drop .ico{font-size:34px;margin-bottom:8px}
.drop strong{font-size:15px;display:block;margin-bottom:4px}
.drop p{font-size:12px;color:#888}
.sep{text-align:center;color:#aaa;font-size:13px;margin:10px 0}
.card{background:#fff;border-radius:12px;border:1px solid #ede8e0;margin-bottom:12px}
.card-head{padding:10px 14px;font-size:12px;font-weight:700;color:#fff;border-radius:12px 12px 0 0}
.card-body{padding:14px}
textarea{width:100%;border:1px solid #ede8e0;border-radius:8px;padding:10px;font-size:12px;font-family:monospace;height:110px;resize:vertical;background:#fafafa;display:block}
.btn{display:block;width:100%;background:#8B1A1A;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;text-align:center}
.btn-sm{display:inline-block;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-green{background:#2d6a4f;color:#fff}
.btn-outline{background:transparent;color:#8B1A1A;border:1px solid #8B1A1A}
.err{background:#fef2f2;border:1px solid #f87171;color:#b91c1c;border-radius:10px;padding:12px;font-size:13px;margin-bottom:12px;display:none}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:#fff;border:1px solid #ede8e0;border-radius:10px;padding:8px 14px;font-size:13px}
.stat-gift{background:#fffbeb;border-color:#f59e0b;color:#b45309}
.stat-info{background:#eff6fc;border-color:#93c5fd;color:#1d4ed8}
.tabs{display:flex;border-bottom:1px solid #ede8e0;overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.tab.on{color:#8B1A1A;border-bottom-color:#8B1A1A}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;background:#fdf8f5;color:#666;font-weight:600;white-space:nowrap;position:sticky;top:0}
td{padding:8px 10px;border-top:1px solid #f0ebe5}
tr.gift{background:#fffbeb}
.mono{font-family:monospace;color:#666}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:600}
.tag-gift{background:#fffbeb;border:1px solid #f59e0b;color:#b45309}
.loading{text-align:center;padding:40px;color:#888}
.act-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <span>📦</span>
  <h1>iOPEN 出貨明細解析</h1>
  <a href="./index.html">← 理貨台</a>
</header>
<div class="wrap">
  <div id="errBox" class="err"></div>

  <!-- 上傳區 -->
  <div id="upSec">
    <label class="drop" id="dropArea">
      <input type="file" id="fileIn" multiple style="display:none">
      <div class="ico">📄</div>
      <strong>點擊選擇 iOPEN 出貨明細 PDF</strong>
      <p>支援多檔同時選擇</p>
    </label>
    <div class="sep">或</div>
    <div class="card">
      <div class="card-head" style="background:#555">貼入出貨明細文字</div>
      <div class="card-body">
        <textarea id="pasteIn" placeholder="從 iOPEN 後台出貨明細頁複製全部文字貼入..."></textarea>
        <button class="btn" onclick="fromText()">解析</button>
      </div>
    </div>
  </div>

  <div id="loadBox" class="loading" style="display:none">📖 讀取 PDF 中，請稍候...</div>

  <!-- 結果 -->
  <div id="resSec" style="display:none">
    <div id="statsBar" class="stats"></div>
    <div class="card">
      <div class="tabs" id="tabBar"></div>
      <div id="tabBody" style="overflow-x:auto"></div>
    </div>
    <div class="act-row">
      <button class="btn-sm btn-green" onclick="doExport()">匯出 CSV</button>
      <button class="btn-sm btn-outline" onclick="doReset()">重新上傳</button>
    </div>
  </div>
</div>

<script>
if(typeof pdfjsLib!=='undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

var parsed=null, curTab=0;

// ── 事件 ──
document.getElementById('fileIn').addEventListener('change',function(e){
  var files=Array.from(e.target.files||[]);
  if(files.length) readFiles(files);
  e.target.value='';
});
var da=document.getElementById('dropArea');
da.addEventListener('dragover',function(e){e.preventDefault();da.classList.add('drag');});
da.addEventListener('dragleave',function(){da.classList.remove('drag');});
da.addEventListener('drop',function(e){
  e.preventDefault();da.classList.remove('drag');
  var files=Array.from(e.dataTransfer.files||[]);
  if(files.length) readFiles(files);
});

function readFiles(files){
  showErr('');
  show('loadBox',true); show('upSec',false);
  Promise.all(files.map(function(f){
    if(f.name.toLowerCase().endsWith('.pdf')||f.type==='application/pdf') return readPdf(f);
    return readTxt(f);
  })).then(function(texts){
    var combined=texts.filter(Boolean).join('\n');
    show('loadBox',false);
    if(!combined.trim()){ show('upSec',true); showErr('讀取失敗，請改用貼入文字方式'); return; }
    go(combined);
  }).catch(function(err){
    show('loadBox',false); show('upSec',true);
    showErr('讀取失敗：'+(err&&err.message?err.message:'未知錯誤'));
  });
}

function readPdf(file){
  return new Promise(function(resolve,reject){
    var r=new FileReader();
    r.onerror=function(){reject(new Error('檔案讀取失敗'));};
    r.onload=function(e){
      if(typeof pdfjsLib==='undefined'){reject(new Error('PDF.js 未載入'));return;}
      try{
        pdfjsLib.getDocument({data:new Uint8Array(e.target.result)}).promise
          .then(function(pdf){
            var nums=[];for(var i=1;i<=pdf.numPages;i++)nums.push(i);
            return nums.reduce(function(ch,n){
              return ch.then(function(acc){
                return pdf.getPage(n).then(function(pg){return pg.getTextContent();})
                  .then(function(tc){
                    var txt='',lastY=null;
                    tc.items.forEach(function(it){
                      var y=it.transform[5];
                      if(lastY!==null&&Math.abs(y-lastY)>3)txt+='\n';
                      txt+=it.str; lastY=y;
                    });
                    return acc+txt+'\n';
                  });
              });
            },Promise.resolve(''));
          }).then(resolve).catch(reject);
      }catch(err){reject(err);}
    };
    r.readAsArrayBuffer(file);
  });
}

function readTxt(file){
  return new Promise(function(resolve,reject){
    var r=new FileReader();
    r.onerror=reject;
    r.onload=function(e){resolve(e.target.result);};
    r.readAsText(file,'utf-8');
  });
}

function fromText(){
  var t=document.getElementById('pasteIn').value.trim();
  if(!t){showErr('請貼入文字');return;}
  showErr(''); go(t);
}

// ── 解析 ──
function go(raw){
  parsed=parse(raw);
  curTab=0;
  render();
}

function norm(t){
  // NFKC 一次搞定所有 Kangxi 變體字元
  if(t.normalize) t=t.normalize('NFKC');
  // 補充常見不在 NFKC 的特殊冒號
  t=t.replace(/\uFE30/g,'：').replace(/\uFF1A/g,'：');
  return t;
}

function parse(raw){
  var t=norm(raw);

  // 找揀貨單（最後彙總）
  var pickIdx=t.indexOf('揀貨單');
  var pickSec=pickIdx>=0?t.slice(pickIdx):'';
  var main=pickIdx>=0?t.slice(0,pickIdx):t;

  // 揀貨清單
  var pick=[];
  if(pickSec){
    var pls=pickSec.split('\n');
    for(var pi=0;pi<pls.length-1;pi++){
      var pl=pls[pi].trim();
      if(/^P\d{10,}$/.test(pl)){
        var nx=(pls[pi+1]||'').trim();
        var qm=nx.match(/ (\d+)\s*$/);
        if(qm) pick.push({prodNo:pl,desc:nx.slice(0,nx.lastIndexOf(qm[1])).trim(),qty:parseInt(qm[1])});
      }
    }
  }

  // 分割訂單（每筆以「收件人：」開頭）
  var blocks=main.split(/(?=收件人[：:])/);
  var live=[], plat=[];

  blocks.forEach(function(block){
    block=block.trim();
    if(!block||block.indexOf('訂單編號')<0)return;
    var o={};

    var nm=block.match(/收件人[：:]\s*(\S+)/);
    if(nm) o.name=nm[1].replace(/付款方式.*/,'').trim();

    var pm=block.match(/聯絡電話[：:]\s*([\d-]+)/)||block.match(/行動電話[：:]\s*([\d-]+)/);
    if(pm) o.phone=pm[1].replace(/-/g,'');

    // 門市
    var sm=block.match(/門市名稱[：:][^\n]*?[（(](\d+)[）)]\s*([^\n]+)/);
    if(sm){ o.storeCode=sm[1]; o.storeName=sm[2].replace(/門市電話.*/,'').trim(); }

    var om=block.match(/訂單編號[：:]\s*(\d+)/);
    if(om) o.orderNum=om[1];
    var sh=block.match(/出貨單編號[：:]\s*(\d+)/);
    if(sh) o.shipNum=sh[1];
    var dm=block.match(/交易日期[：:]\s*([\d-]+)/);
    if(dm) o.date=dm[1];

    // 商品行：把換行換成空格再找 直播｜（account）
    var flat=block.replace(/\n/g,' ');
    var lp=/直播[｜|]\s*[（(]([^）)]+)[）)]/g;
    var lm=lp.exec(flat);
    var accs=[];
    while(lm){accs.push(lm[1]);lm=lp.exec(flat);}

    if(accs.length>0){
      o.account=accs[0].replace(/\+[^\d$]+\d+/,'').trim();
      // 金額
      var amts=[];
      var ap=/\$?(\d{3,6})\s*1/g;
      var am=ap.exec(flat);
      while(am){
        var v=parseInt(am[1]);
        if(v>=300&&v<=99999) amts.push(v);
        am=ap.exec(flat);
      }
      o.amount=amts.reduce(function(s,v){return s+v;},0);
      live.push(o);
    } else {
      // 平台商品：解析商品列表
      var prods=[];
      var prodRe=/^P\d{10,}\n(.+)/gm;
      var pm2=prodRe.exec(block);
      while(pm2){prods.push(pm2[1].trim());pm2=prodRe.exec(block);}
      o.products=prods;
      o.amount=0;
      plat.push(o);
    }
  });

  // 同電話累計
  var ph={};
  live.forEach(function(o){if(o.phone)ph[o.phone]=(ph[o.phone]||0)+(o.amount||0);});
  live.forEach(function(o){o.total=ph[o.phone]||o.amount||0; o.gift=o.total>=3500;});

  return{live:live,plat:plat,pick:pick};
}

// ── 渲染 ──
function render(){
  show('upSec',false); show('resSec',true);
  var l=parsed.live,p=parsed.plat,pk=parsed.pick;
  var g=l.filter(function(o){return o.gift;});
  var sb=document.getElementById('statsBar');
  sb.innerHTML=
    '<div class="stat">直播 <strong>'+l.length+'</strong> 筆</div>'+
    '<div class="stat">平台商品 <strong>'+p.length+'</strong> 筆</div>'+
    (g.length?'<div class="stat stat-gift">🎁 滿額贈 <strong>'+g.length+'</strong> 人</div>':'')+
    (pk.length?'<div class="stat stat-info">揀貨 <strong>'+pk.length+'</strong> 項</div>':'');

  var tabs=[['直播訂單',l.length],['平台商品',p.length],['揀貨清單',pk.length]];
  document.getElementById('tabBar').innerHTML=tabs.map(function(t,i){
    return '<button class="tab'+(i===curTab?' on':'')+'" onclick="switchTab('+i+')">'+t[0]+' ('+t[1]+')</button>';
  }).join('');
  renderTab(curTab);
}

function switchTab(i){
  curTab=i;
  document.querySelectorAll('.tab').forEach(function(t,j){t.className='tab'+(j===i?' on':'');});
  renderTab(i);
}

function renderTab(i){
  var l=parsed.live,p=parsed.plat,pk=parsed.pick;
  var h='';
  if(i===0){
    h='<table><thead><tr><th>IG帳號</th><th>姓名</th><th>電話</th><th>門市</th><th>訂單編號</th><th>出貨單號</th><th>金額</th><th>🎁</th></tr></thead><tbody>';
    l.forEach(function(o,j){
      h+='<tr'+(o.gift?' class="gift"':'')+'>'
        +'<td><strong>'+e(o.account||'—')+'</strong></td>'
        +'<td>'+e(o.name||'—')+'</td>'
        +'<td class="mono">'+e(o.phone||'—')+'</td>'
        +'<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis">'+e(o.storeName||'—')+'</td>'
        +'<td class="mono">'+e(o.orderNum||'—')+'</td>'
        +'<td class="mono" style="color:#aaa">'+e(o.shipNum||'—')+'</td>'
        +'<td><strong>'+(o.amount?'$'+o.amount:'—')+'</strong></td>'
        +'<td>'+(o.gift?'🎁':'—')+'</td>'
        +'</tr>';
    });
    h+='</tbody></table>';
  } else if(i===1){
    h='<table><thead><tr><th>姓名</th><th>電話</th><th>門市</th><th>訂單編號</th><th>出貨單號</th></tr></thead><tbody>';
    p.forEach(function(o){
      h+='<tr>'
        +'<td>'+e(o.name||'—')+'</td>'
        +'<td class="mono">'+e(o.phone||'—')+'</td>'
        +'<td>'+e(o.storeName||'—')+'</td>'
        +'<td class="mono">'+e(o.orderNum||'—')+'</td>'
        +'<td class="mono" style="color:#aaa">'+e(o.shipNum||'—')+'</td>'
        +'</tr>';
    });
    h+='</tbody></table>';
  } else {
    h='<table><thead><tr><th>商品貨號</th><th>商品名稱/規格</th><th>數量</th></tr></thead><tbody>';
    pk.forEach(function(p){
      h+='<tr>'
        +'<td class="mono" style="color:#aaa;font-size:10px">'+e(p.prodNo)+'</td>'
        +'<td>'+e(p.desc)+'</td>'
        +'<td><strong>'+p.qty+'</strong></td>'
        +'</tr>';
    });
    h+='</tbody></table>';
  }
  document.getElementById('tabBody').innerHTML=h;
}

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function doExport(){
  if(!parsed)return;
  var rows=[['IG帳號','姓名','電話','門市','訂單編號','出貨單號','金額','需贈品']];
  parsed.live.forEach(function(o){
    rows.push([o.account||'',o.name||'',o.phone||'',o.storeName||'',o.orderNum||'',o.shipNum||'',o.amount||'',o.gift?'是':'']);
  });
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='iOPEN訂單_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function doReset(){
  parsed=null;
  show('upSec',true); show('resSec',false);
  document.getElementById('pasteIn').value='';
  showErr('');
}

function show(id,v){document.getElementById(id).style.display=v?'block':'none';}
function showErr(msg){var el=document.getElementById('errBox');el.style.display=msg?'block':'none';el.textContent=msg;}
</script>
</body>
</html>
