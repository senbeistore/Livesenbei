<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>備貨追蹤</title>
<script>
window.onerror=function(msg,src,line,col,err){
  var info='錯誤：\n'+String(msg)+'\n來源：'+String(src)+'\n第'+line+'行 第'+col+'欄\n'+(err&&err.stack?String(err.stack):'無stack');
  document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:12px;">'+info+'</div>';
};
var _consoleErrors=[];
var _origErr=console.error;
console.error=function(){
  var msg=Array.from(arguments).map(function(a){return typeof a==='object'?JSON.stringify(a):String(a);}).join(' ');
  _consoleErrors.push(msg);
  document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:12px;">Babel錯誤：\n'+msg+'</div>';
  _origErr.apply(console,arguments);
};
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#F5F3EE;}
input[type="date"]{-webkit-appearance:none;appearance:none;}
input[type="number"]{-webkit-appearance:none;-moz-appearance:textfield;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// 診斷：確認所有 CDN 都已載入
setTimeout(function(){
  var missing=[];
  if(typeof React==='undefined')missing.push('React');
  if(typeof ReactDOM==='undefined')missing.push('ReactDOM');
  if(typeof Babel==='undefined')missing.push('Babel');
  if(typeof XLSX==='undefined')missing.push('XLSX');
  if(missing.length>0){
    document.body.innerHTML='<div style="padding:20px;color:red;font-family:monospace;">CDN 未載入: '+missing.join(', ')+'</div>';
  } else if(document.getElementById('root')&&document.getElementById('root').children.length===0){
    document.body.innerHTML='<div style="padding:20px;color:orange;font-family:monospace;">CDN OK，但 React 未渲染 - Babel 編譯可能失敗</div>';
  }
},3000);
</script>
<script type="text/babel" data-presets="react">
function App(){return <div style={{padding:20,color:'green',fontFamily:'monospace'}}>Babel OK - React 正常運作</div>;}
try{ReactDOM.createRoot(document.getElementById('root')).render(<App/>);}catch(e){document.body.innerHTML='React錯誤：'+e.message;}
</script>
</body>
</html>
