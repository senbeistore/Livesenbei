                    {(()=>{const typed=shipInputs[o.oKey];const ords=(iopenInfo&&iopenInfo.orders)||[];const isShippedOrd=(x)=>c.orders.some(oo=>(oo.shipments||[]).some(s=>String(s.orderNo)===String(x.orderNo)));const nextOrd=(typed&&ords.find(x=>x.orderNo===typed))||ords.find(x=>!isShippedOrd(x))||ords[shipments.length];if(!nextOrd||!(nextOrd.store||nextOrd.amount>0))return null;
                      const prods=o.allocItems.filter(it=>it.allocatedQty>0).map(it=>dispName(it)+(it.allocatedQty>1?" ×"+it.allocatedQty:""));
                      if(iopenInfo&&iopenInfo.customItems){const _sci2=(c.orders[0]&&c.orders[0].shippedCI)||[];iopenInfo.customItems.forEach(ci=>{const ck=custKey(ci);if(_sci2.indexOf(ck)===-1&&packed[o.oKey+"|CI|"+ck])prods.push(ci.prod+(ci.spec1?" "+ci.spec1:"")+(ci.spec2?" "+ci.spec2:""));});}
                      const cpk=o.oKey+"|"+nextOrd.orderNo;
                      return(
                      <div style={{fontSize:12,color:C.inkMuted,marginBottom:4,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                        {nextOrd.store&&<span>📍{nextOrd.store}</span>}
                        {nextOrd.amount>0&&<span style={{fontFamily:"monospace",fontWeight:700,color:C.ink}}>${nextOrd.amount}</span>}
                        <button onClick={()=>{navigator.clipboard.writeText(buildShipNotice(nextOrd.orderNo,nextOrd.store,prods)).then(()=>{setCopiedKey(cpk);setTimeout(()=>setCopiedKey(""),1800);}).catch(()=>{});}} style={{fontSize:11,color:copiedKey===cpk?C.success:C.info,border:`1px solid ${copiedKey===cpk?C.success:C.info}`,background:copiedKey===cpk?C.successSoft:C.infoSoft,borderRadius:10,padding:"2px 8px",cursor:"pointer"}}>{copiedKey===cpk?"\u2713 已複製":"\ud83d\udccb 複製通知"}</button>
                      </div>
                      );})()}
                    {(()=>{
                      const anyAllocPacked=o.allocItems.some(it=>{if(!(it.allocatedQty>0))return false;for(let u=0;u<it.allocatedQty;u++)if(packed[o.oKey+"|"+unitPackKey(o.allocItems,it,u)])return true;return false;});
                      const _sci=(c.orders[0]&&c.orders[0].shippedCI)||[];
                      const anyCustPacked=(iopenInfo&&iopenInfo.customItems?iopenInfo.customItems:[]).some(ci=>{const ck=custKey(ci);return _sci.indexOf(ck)===-1&&!!packed[o.oKey+"|CI|"+ck];});
                      const anyPacked=anyAllocPacked||anyCustPacked;
                      const hasInput=!!(shipInputs[o.oKey]&&shipInputs[o.oKey].trim());
                      const canConfirm=hasInput&&anyPacked;
                      return(
                    <div style={{display:"flex",gap:6}}>
                      <input type="text" value={shipInputs[o.oKey]||""} onChange={e=>setShipInputs(p=>({...p,[o.oKey]:e.target.value}))}
                        placeholder={(iopenInfo&&iopenInfo.orders&&iopenInfo.orders[shipments.length]&&iopenInfo.orders[shipments.length].orderNo)||(hasShipments?"填入第二次出貨單號":"填入出貨單號")}
                        style={{flex:1,border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,minWidth:0}}/>
                      <button onClick={()=>{
                        if(!hasInput)return;
                        if(!anyPacked){alert("請先勾選已裝袋的品項（含客訂品項），才能出貨");return;}
                        confirmShipment(o.oKey,shipInputs[o.oKey].trim());
                      }}
                        disabled={!canConfirm}
                        style={{background:canConfirm?C.success:"#ccc",color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:canConfirm?"pointer":"default",whiteSpace:"nowrap"}}>
                        確認出貨
                      </button>
                    </div>
                      );})()}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );})}
    </div>
  );
}

// ── 主應用 ──
function App(){
  const[token,setToken]=useState(()=>localStorage.getItem("st_token")||"");
  const[iopenCustom,setIopenCustom]=useState([]);
  const[iopenData,setIopenData]=useState({});
  const iopenCustomRef=useRef([]);
  const iopenDataRef=useRef({});
  const iopenAppRef=useRef(null);
  const[workspaces,setWorkspaces]=useState(()=>{const raw=localStorage.getItem("st_workspaces");if(raw){try{return JSON.parse(raw);}catch{}}const oldGist=localStorage.getItem("st_gist_id");if(oldGist)return[{name:"第一場次",gistId:oldGist}];return[];});
  const[activeIdx,setActiveIdx]=useState(()=>{const i=parseInt(localStorage.getItem("st_active")||"0",10);return isNaN(i)?0:i;});
  const gistId=workspaces[activeIdx]?.gistId||"";
  const[setupMode,setSetupMode]=useState(()=>{const raw=localStorage.getItem("st_workspaces");if(raw){try{const w=JSON.parse(raw);return w.length===0;}catch{}}return!localStorage.getItem("st_gist_id");});
  const[showWorkspaces,setShowWorkspaces]=useState(false);const[newWsName,setNewWsName]=useState("");const[newWsBusy,setNewWsBusy]=useState(false);const[newWsErr,setNewWsErr]=useState("");
  const[items,setItems]=useState([]);
  const[savedAlloc,setSavedAlloc]=useState(null);
  const savedAllocRef=useRef(null); // 用 ref 避免閉包舊值問題
  const[filter,setFilter]=useState("unordered");const[search,setSearch]=useState("");
  const[loading,setLoading]=useState(false);const[saving,setSaving]=useState(false);const[lastSaved,setLastSaved]=useState(null);const[globalErr,setGlobalErr]=useState("");
  const[showSettings,setShowSettings]=useState(false);
  const[batchSel,setBatchSel]=useState(new Set());const[batchDate1,setBatchDate1]=useState("");const[batchDate2,setBatchDate2]=useState("");
  const[allocMode,setAllocMode]=useState(false);
  const fileRef=useRef(null);const saveTimer=useRef(null);

  useEffect(()=>{savedAllocRef.current=savedAlloc;},[savedAlloc]);
  useEffect(()=>{
    if(!setupMode&&token&&gistId){setLoading(true);gFetch(token,gistId).then(({items:its,savedAlloc:sa,iopenCustom:ic,iopenData:idt})=>{setItems(its);setSavedAlloc(sa);if(ic&&ic.length){iopenCustomRef.current=ic;setIopenCustom(ic);}if(idt&&Object.keys(idt).length){iopenDataRef.current=idt;setIopenData(idt);}setLoading(false);}).catch(e=>{setGlobalErr(e.message);setLoading(false);});}
  },[]);

  const scheduleSave=useCallback((newItems,newAlloc)=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      // 用 ref 讀最新值，避免閉包舊值覆蓋出貨記錄
      const allocToSave=newAlloc!==undefined?newAlloc:savedAllocRef.current;
      setSaving(true);
      gSave(token,gistId,newItems,allocToSave,iopenCustomRef.current,iopenDataRef.current).then(()=>{setSaving(false);setLastSaved(new Date());}).catch(e=>{setSaving(false);setGlobalErr("自動儲存失敗："+e.message);});
    },800);
  },[token,gistId]);

  function updateField(id,field,value){setItems(prev=>{const next=prev.map(it=>it.id===id?{...it,[field]:value}:it);scheduleSave(next);return next;});}

  function saveWorkspaces(ws,idx){localStorage.setItem("st_workspaces",JSON.stringify(ws));localStorage.setItem("st_active",String(idx));}

  function switchWorkspace(idx){
    setActiveIdx(idx);localStorage.setItem("st_active",String(idx));
    setItems([]);setSavedAlloc(null);setFilter("unordered");setSearch("");setShowWorkspaces(false);setAllocMode(false);
    const gid=workspaces[idx]?.gistId;
    if(gid&&token){setLoading(true);gFetch(token,gid).then(({items:its,savedAlloc:sa})=>{setItems(its);setSavedAlloc(sa);setLoading(false);}).catch(e=>{setGlobalErr(e.message);setLoading(false);});}
  }
  async function addWorkspace(){
    if(!newWsName.trim()){setNewWsErr("請輸入場次名稱");return;}setNewWsErr("");setNewWsBusy(true);
    try{const id=await gCreate(token);const ws=[...workspaces,{name:newWsName.trim(),gistId:id}];const idx=ws.length-1;setWorkspaces(ws);setActiveIdx(idx);saveWorkspaces(ws,idx);setItems([]);setSavedAlloc(null);setFilter("unordered");setSearch("");setShowWorkspaces(false);setNewWsName("");}catch(e){setNewWsErr(e.message);}finally{setNewWsBusy(false);}
  }
  function deleteWorkspace(idx){
    if(!window.confirm(`確定刪除「${workspaces[idx].name}」？（只刪除本機記錄，Gist資料不受影響）`))return;
    const ws=workspaces.filter((_,i)=>i!==idx);const newIdx=Math.min(activeIdx,Math.max(0,ws.length-1));
    setWorkspaces(ws);setActiveIdx(newIdx);saveWorkspaces(ws,newIdx);
    if(ws.length===0){setSetupMode(true);setShowWorkspaces(false);}else switchWorkspace(newIdx);
  }
  function resetSetup(){localStorage.removeItem("st_token");localStorage.removeItem("st_gist_id");localStorage.removeItem("st_workspaces");localStorage.removeItem("st_active");setToken("");setWorkspaces([]);setActiveIdx(0);setItems([]);setSavedAlloc(null);setSetupMode(true);setShowSettings(false);setShowWorkspaces(false);}
  function handleCSV(e){
    const files=Array.from(e.target.files||[]);if(!files.length)return;
    Promise.all(files.map(file=>new Promise(resolve=>{const reader=new FileReader();reader.onload=ev=>resolve(parseBakuCSV(ev.target.result));reader.readAsText(file,"utf-8");})))
    .then(results=>{
      const aggMap={};results.forEach(parsed=>{parsed.forEach(p=>{const k=itemKey(p);if(aggMap[k])aggMap[k].qty+=p.qty;else aggMap[k]={...p};});});
      setItems(prev=>{
        const ex={};prev.forEach(it=>{ex[itemKey(it)]=it;});
        const merged=Object.values(aggMap).map(p=>{const k=itemKey(p);if(ex[k])return{...ex[k],qty:p.qty};return{...p,id:genId(),importedAt:todayStr(),firstOrderDate:"",secondOrderDate:"",allOrdered:false,orderedQty:p.qty,arrivedQty:0,shippedQty:0,allArrived:false,arrivedTs:"",firstArrivedTs:""};});
        const mk=new Set(merged.map(itemKey));prev.forEach(it=>{if(!mk.has(itemKey(it)))merged.push(it);});
        scheduleSave(merged);return merged;
      });
    });
    e.target.value="";
  }

  if(setupMode)return<Setup onDone={(t,g,name)=>{setToken(t);const ws=[{name:name||"第一場次",gistId:g}];setWorkspaces(ws);setActiveIdx(0);saveWorkspaces(ws,0);localStorage.setItem("st_token",t);setSetupMode(false);gFetch(t,g).then(({items:its,savedAlloc:sa})=>{setItems(its);setSavedAlloc(sa);}).catch(e=>setGlobalErr(e.message));}}/>;

  function handleIopenAppXLS(files){
    if(!files||!files.length)return;
    var arr=Array.from(files);
    var pending=arr.length,merged=[];
    arr.forEach(function(file){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          var result=parseIopenXLS(aoa);
          var allCustom=(result&&result.allCustom)||[];
          var unmatched=(result&&result.unmatched)||[];
          // 未歸屬（查無 IG）訂單的商品也要進備貨清單
          var uItems=[];
          unmatched.forEach(function(u){(u.items||[]).forEach(function(it){uItems.push({orderNo:u.orderNo,prod:it.prod,spec1:it.spec1,spec2:it.spec2,qty:it.qty||1});});});
          var combined=allCustom.concat(uItems);
          var dkey=function(c){return c.orderNo+'|'+c.prod+'|'+(c.spec1||'')+'|'+(c.spec2||'');};
          var seen={};
          merged.forEach(function(c){seen[dkey(c)]=1;});
          combined.forEach(function(c){if(!seen[dkey(c)]){seen[dkey(c)]=1;merged.push(c);}});
        }catch(e){alert(file.name+' 讀取失敗：'+e.message);}
        pending--;
        if(pending===0){
          var filtered=merged.filter(function(c){var p=c.prod&&c.prod.trim();return p&&p!=='運費'&&p.indexOf('湊卷')===-1&&p.indexOf('自願使用無退款')===-1;});
          iopenCustomRef.current=filtered.slice();setIopenCustom(filtered.slice());
          setItems(function(prev){
            var next=mergeCustomIntoItems(prev,filtered);
            var addedN=next.length-(prev?prev.length:0);
            if(token&&gistId){setSaving(true);gSave(token,gistId,next,savedAllocRef.current,filtered,iopenDataRef.current).then(function(){setSaving(false);setLastSaved(new Date());}).catch(function(e){setSaving(false);setGlobalErr("儲存失敗："+e.message);});}
            setTimeout(function(){alert("客訂商品匯入完成：新增 "+addedN+" 項到備貨清單（已存在的品項不重複）。");},50);
            return next;
          });
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  // 需求彙總資料（useMemo 預先計算）
  const summaryData=useMemo(()=>{
    const prodGroups={};
    items.forEach(it=>{
      if(!prodGroups[it.product])prodGroups[it.product]=[];
      prodGroups[it.product].push(it);
    });
    return Object.keys(prodGroups).sort((a,b)=>a.localeCompare(b)).map(prod=>{
      const its=prodGroups[prod];
      const hasSizeField=its.some(it=>it.size);
      const varGroups={};
      its.forEach(it=>{
        const vk=hasSizeField?[it.style,it.color].filter(Boolean).join(" "):(it.style||it.color||"");
        const sd=hasSizeField?it.size:(it.color||"");
        if(!varGroups[vk])varGroups[vk]={sizes:{}};
        varGroups[vk].sizes[sd]=(varGroups[vk].sizes[sd]||0)+it.qty;
      });
      const prodTotal=its.reduce((s,i)=>s+i.qty,0);
      const variants=Object.keys(varGroups).sort((a,b)=>a.localeCompare(b)).map(vk=>{
        const sg=varGroups[vk].sizes;
        const szKeys=Object.keys(sg).sort((a,b)=>sizeOrder(a)-sizeOrder(b));
        // 判斷此款式是否全部已訂完
        const grpItems=its.filter(it2=>{const v2=hasSizeField?[it2.style,it2.color].filter(Boolean).join(" "):(it2.style||it2.color||"");return v2===vk;});
        const grpIds=grpItems.map(it2=>it2.id);
        // 全部有訂購日 = 已訂（綠色）；部分有訂購日 = 訂貨中（橘色）
        const orderedCount=grpItems.filter(it2=>it2.firstOrderDate||it2.allOrdered).length;
        const allOrdered=grpItems.length>0&&grpItems.every(it2=>it2.allArrived);
        const anyOrdered=orderedCount>0;
        const szDone={};szKeys.forEach(function(sz){const szIt=grpItems.find(function(it2){return (hasSizeField?it2.size:(it2.color||""))===sz;});szDone[sz]=!!(szIt&&(szIt.allArrived||(szIt.arrivedQty||0)>0||(szIt.stockQty||0)>0));});return{vk,szKeys,sg,total:szKeys.reduce((s,k)=>s+sg[k],0),allOrdered,anyOrdered,grpIds,szDone};
      });
      return{prod,prodTotal,variants};
    });
  },[items]);

  const displayed=items.filter(it=>{if(filter==="unordered")return!it.allArrived&&(it.arrivedQty||0)===0&&(it.stockQty||0)===0&&!it.firstOrderDate;if(filter==="ordered")return!it.allArrived&&(it.arrivedQty||0)===0&&(it.stockQty||0)===0&&!!it.firstOrderDate;if(filter==="arrived")return it.allArrived||(it.arrivedQty||0)>0||(it.stockQty||0)>0;return true;}).filter(it=>!search.trim()||it.product.includes(search.trim())).slice().sort((a,b)=>{
  const pd=sortPri(a)-sortPri(b);if(pd!==0)return pd;
  const gka=getGroupKey(a),gkb=getGroupKey(b);
  const cd=gka.localeCompare(gkb);if(cd!==0)return cd;
  return getSortSize(a)-getSortSize(b);
});
  const arrivedCount=items.filter(it=>it.allArrived).length;
  const late3Count=items.filter(isLateOrder).length;
  const late14Count=items.filter(isLateArrival).length;
  const allSel=displayed.length>0&&displayed.every(it=>batchSel.has(it.id));

  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:batchSel.size>0?220:0}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:640,margin:"0 auto",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div>
            <div style={{color:C.stamp,fontWeight:700,fontSize:17,display:"flex",alignItems:"center",gap:6}}>備貨追蹤<span style={{fontSize:10,fontWeight:600,color:"#fff",background:"#7C3AED",borderRadius:8,padding:"1px 6px"}}>build 0723-N</span></div>
            <button onClick={()=>{setShowWorkspaces(!showWorkspaces);setShowSettings(false);}} style={{color:C.inkMuted,fontSize:12,background:"none",border:"none",padding:0,cursor:"pointer",display:"flex",alignItems:"center",gap:3}}>
              {workspaces[activeIdx]?.name||"場次"} <span style={{fontSize:10}}>▼</span>
            </button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {saving&&<span style={{color:C.inkMuted,fontSize:11}}>儲存中…</span>}
            {lastSaved&&!saving&&<span style={{color:C.inkMuted,fontSize:11}}>已儲存 {fmtSavedTime(lastSaved)}</span>}
            {!allocMode&&<button onClick={()=>fileRef.current.click()} style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>匯入備貨清單</button>}
            {!allocMode&&<button onClick={()=>iopenAppRef.current.click()} style={{background:"#7C3AED",color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>客訂XLS</button>}
            <input ref={iopenAppRef} type="file" accept=".xls,.xlsx" multiple style={{display:"none"}} onChange={e=>handleIopenAppXLS(e.target.files)}/>
            <input ref={fileRef} type="file" accept=".csv" multiple style={{display:"none"}} onChange={handleCSV}/>
            <button onClick={()=>{setAllocMode(!allocMode);setShowWorkspaces(false);setShowSettings(false);}} style={{background:allocMode?C.info:C.surface,color:allocMode?"#fff":C.inkMuted,border:`1px solid ${allocMode?C.info:C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13,fontWeight:allocMode?"600":"400",cursor:"pointer"}}>配貨</button>
            <button onClick={()=>{setShowSettings(!showSettings);setShowWorkspaces(false);}} style={{border:`1px solid ${C.line}`,background:C.surface,color:C.inkMuted,borderRadius:8,padding:"7px 10px",fontSize:14,cursor:"pointer"}}>⚙</button>
          </div>
        </div>
        {showWorkspaces&&(
          <div style={{background:C.surface,borderTop:`1px solid ${C.line}`,padding:"12px 14px"}}>
            <div style={{maxWidth:640,margin:"0 auto"}}>
              <div style={{color:C.inkMuted,fontSize:11,marginBottom:8,fontWeight:600}}>切換場次</div>
              {workspaces.map((ws,i)=>(
                <div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
                  <button onClick={()=>switchWorkspace(i)} style={{flex:1,textAlign:"left",background:i===activeIdx?C.infoSoft:C.stripe,color:i===activeIdx?C.info:C.ink,border:`1px solid ${i===activeIdx?C.info:C.line}`,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:i===activeIdx?"600":"400",cursor:"pointer"}}>{i===activeIdx?"▶ ":""}{ws.name}</button>
                  {workspaces.length>1&&<button onClick={()=>deleteWorkspace(i)} style={{color:C.inkMuted,border:`1px solid ${C.line}`,background:C.surface,borderRadius:6,padding:"6px 8px",fontSize:12,cursor:"pointer"}}>刪除</button>}
                </div>
              ))}
              <div style={{borderTop:`1px solid ${C.line}`,marginTop:10,paddingTop:10}}>
                <div style={{color:C.inkMuted,fontSize:11,marginBottom:6,fontWeight:600}}>新增場次</div>
                <div style={{display:"flex",gap:6}}>
                  <input type="text" value={newWsName} onChange={e=>setNewWsName(e.target.value)} placeholder="場次名稱，例如：0630直播" style={{flex:1,border:`1px solid ${C.line}`,borderRadius:8,padding:"7px 10px",fontSize:13}}/>
                  <button onClick={addWorkspace} disabled={!newWsName.trim()||newWsBusy} style={{background:newWsName.trim()&&!newWsBusy?C.stamp:"#ccc",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:600,cursor:newWsName.trim()&&!newWsBusy?"pointer":"default",whiteSpace:"nowrap"}}>{newWsBusy?"建立中…":"新增"}</button>
                </div>
                {newWsErr&&<div style={{color:C.stamp,fontSize:12,marginTop:4}}>{newWsErr}</div>}
              </div>
            </div>
          </div>
        )}
        {showSettings&&(
          <div style={{background:C.stripe,borderTop:`1px solid ${C.line}`,padding:"10px 14px",fontSize:12,color:C.inkMuted}}>
            <div style={{maxWidth:640,margin:"0 auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span>Gist ID：<code style={{fontSize:11,color:C.ink}}>{gistId}</code></span>
              <button onClick={()=>{try{navigator.clipboard.writeText(gistId);}catch{}}} style={{border:`1px solid ${C.line}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>複製</button>
              <button onClick={resetSetup} style={{color:C.stamp,border:`1px solid ${C.stamp}`,padding:"2px 8px",borderRadius:6,cursor:"pointer"}}>重置所有設定</button>
              <button onClick={()=>{
                if(!window.confirm("將所有已到貨數量轉為現貨？（arrivedQty → stockQty，已到貨歸零）"))return;
                setItems(prev=>{
                  const next=prev.map(it=>(it.arrivedQty||0)>0?{...it,stockQty:(it.stockQty||0)+(it.arrivedQty||0),arrivedQty:0,allArrived:false,arrivedTs:"",firstArrivedTs:""}:it);
                  scheduleSave(next);return next;
                });
              }} style={{color:"#059669",border:"1px solid #059669",padding:"2px 8px",borderRadius:6,cursor:"pointer",background:"transparent",fontSize:12}}>已到貨→現貨</button>
            </div>
          </div>
        )}
      </div>

      {allocMode&&<AllocationView items={items} savedAlloc={savedAlloc} onClose={()=>setAllocMode(false)}
        onSaveAlloc={(newAlloc)=>{savedAllocRef.current=newAlloc;setSavedAlloc(newAlloc);scheduleSave(items,newAlloc);}}
        iopenData={iopenData}
        onSaveIopen={(d)=>{iopenDataRef.current=d;setIopenData(d);var custList=iopenCustomFromData(d);iopenCustomRef.current=custList.slice();setItems(function(prev){var next=mergeCustomIntoItems(prev,custList);scheduleSave(next,savedAllocRef.current);return next;});}}
        onConfirmShipment={(oKey,shippedItems,newAlloc)=>{
          // 扣除庫存，並明確傳遞最新 alloc 避免閉包舊值問題
          setItems(prev=>{
            const next=prev.map(it=>{
              const shipped=shippedItems.find(s=>itemKey(s)===itemKey(it));
              if(!shipped||!shipped.allocatedQty)return it;
              const newShipped=Math.min((it.shippedQty||0)+shipped.allocatedQty,it.arrivedQty||0);
              return{...it,shippedQty:newShipped};
            });
            scheduleSave(next,newAlloc);
            return next;
          });
        }}
        onRevokeShipment={(oKey,revokedItems,newAlloc)=>{
          // 撤銷出貨：把已出貨件數退回，庫存才能重新配給
          setItems(prev=>{
            const next=prev.map(it=>{
              const rv=(revokedItems||[]).find(s=>itemKey(s)===itemKey(it));
              if(!rv||!rv.allocatedQty)return it;
              return{...it,shippedQty:Math.max(0,(it.shippedQty||0)-rv.allocatedQty)};
            });
            scheduleSave(next,newAlloc);
            return next;
          });
        }}
        onUnarrive={(item,qty,newAlloc)=>{
          // 配貨區退回待補：連動扣除備貨中心已到貨數量
          setItems(prev=>{
            const next=prev.map(it=>{
              if(itemKey(it)!==itemKey(item))return it;
              const na=Math.max(0,(it.arrivedQty||0)-(qty||1));
              return{...it,arrivedQty:na,allArrived:false,...(na===0?{firstArrivedTs:"",arrivedTs:""}:{})};
            });
            scheduleSave(next,newAlloc);
            return next;
          });
        }}
        onArrive={(item,qty,newAlloc)=>{
          // 配貨區標記到貨：連動增加備貨中心已到貨數量
          setItems(prev=>{
            const next=prev.map(it=>{
              if(itemKey(it)!==itemKey(item))return it;
              const maxQ=it.orderedQty!=null?it.orderedQty:it.qty;
              const na=Math.min((it.arrivedQty||0)+(qty||1),maxQ);
              return{...it,arrivedQty:na,allArrived:na>=maxQ,firstArrivedTs:it.firstArrivedTs||new Date().toISOString(),arrivedTs:na>=maxQ?(it.arrivedTs||new Date().toISOString()):it.arrivedTs};
            });
            scheduleSave(next,newAlloc);
            return next;
          });
        }}
      />}

      {!allocMode&&(
        <div style={{maxWidth:640,margin:"0 auto",padding:"14px 14px"}}>
          {globalErr&&(<div style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{globalErr}</span><button onClick={()=>setGlobalErr("")} style={{marginLeft:8,textDecoration:"underline",cursor:"pointer"}}>關閉</button></div>)}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{color:C.ink,fontSize:14}}>已到貨 <strong style={{color:C.success}}>{arrivedCount}</strong> / {items.length} 筆</span>
            {late3Count>0&&<span style={{background:C.orangeSoft,color:C.orange,border:`1px solid ${C.orange}`,borderRadius:20,padding:"2px 10px",fontSize:11}}>⚠ {late3Count} 筆逾3天未訂</span>}
            {late14Count>0&&<span style={{background:C.warningSoft,color:C.warning,border:`1px solid ${C.warning}`,borderRadius:20,padding:"2px 10px",fontSize:11}}>🚨 {late14Count} 筆逾14天未到</span>}
            <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
              {[["unordered","未訂貨"],["ordered","已訂待到"],["arrived","已到貨"]].map(([v,l])=>(<button key={v} onClick={()=>setFilter(v)} style={{background:filter===v?C.stamp:C.surface,color:filter===v?"#fff":C.inkMuted,border:`1px solid ${filter===v?C.stamp:C.line}`,borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>{l}</button>))}
            </div>
          </div>
          <div style={{position:"relative",marginBottom:10}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:16,pointerEvents:"none"}}>🔍</span>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋商品名稱" style={{width:"100%",border:`1px solid ${search?C.info:C.line}`,borderRadius:10,padding:"9px 36px 9px 34px",fontSize:14,background:C.surface,color:C.ink,boxSizing:"border-box"}}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.inkMuted,fontSize:18,background:"none",border:"none",cursor:"pointer"}}>×</button>}
          </div>
          {displayed.length>0&&(
            <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <input type="checkbox" checked={allSel} onChange={e=>{if(e.target.checked)setBatchSel(new Set([...batchSel,...displayed.map(it=>it.id)]));else setBatchSel(prev=>{const n=new Set(prev);displayed.forEach(it=>n.delete(it.id));return n;});}} style={{width:22,height:22,accentColor:C.info,cursor:"pointer"}}/>
              <span style={{color:C.inkMuted,fontSize:14}}>{batchSel.size>0?<strong style={{color:C.info}}>已選 {batchSel.size} 筆</strong>:"全選"}</span>
              {batchSel.size>0&&<span style={{color:C.inkMuted,fontSize:12}}>— 在下方設定日期後按套用</span>}
            </div>
          )}

          {loading?(<div style={{color:C.inkMuted,textAlign:"center",padding:"48px 0",fontSize:14}}>讀取中…</div>)
          :items.length===0?(<div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"64px 16px"}}><div style={{fontSize:36,marginBottom:12}}>📦</div><div style={{fontSize:15,fontWeight:600,marginBottom:6}}>還沒有備貨資料</div><div style={{fontSize:13}}>點右上角「匯入備貨清單」上傳從理貨台匯出的CSV</div></div>)
          :displayed.length===0?(<div style={{color:C.inkMuted,border:`2px dashed ${C.line}`,borderRadius:16,textAlign:"center",padding:"40px 16px",fontSize:14}}>這個分類目前沒有資料</div>)
          :(displayed.map((it,idx)=>{const prev=displayed[idx-1];const showStatus=idx===0||(prev&&sortPri(prev)!==sortPri(it));const showGroup=idx===0||(prev&&getGroupKey(prev)!==getGroupKey(it));return(<React.Fragment key={it.id}>{showStatus&&<div style={{color:C.inkMuted,fontSize:12,fontWeight:700,padding:"4px 2px 12px",marginTop:idx===0?0:16}}>{GROUP_LABEL[sortPri(it)]}</div>}{showGroup&&(()=>{
  const groupKey=getGroupKey(it);
  const groupTotal=displayed.filter(x=>getGroupKey(x)===groupKey).reduce((s,x)=>s+x.qty,0);
  return <div style={{background:C.stripe,borderRadius:10,padding:"6px 12px",marginBottom:4,marginTop:showStatus?0:8}}>
    <span style={{fontSize:14,fontWeight:700,color:C.ink}}>{getGroupLabel(it)}</span>
    <span style={{fontSize:12,color:C.inkMuted,marginLeft:6}}>共{groupTotal}件</span>
    {getGroupLabel(it)!==it.product&&<span style={{fontSize:10,color:C.inkMuted,marginLeft:6}}>{it.product}</span>}
  </div>;
})()}<ItemCard it={it} sel={batchSel.has(it.id)} onToggleSel={()=>setBatchSel(prev=>{const n=new Set(prev);n.has(it.id)?n.delete(it.id):n.add(it.id);return n;})} onUpdate={(field,value)=>updateField(it.id,field,value)}/></React.Fragment>);}))
          }
        </div>
      )}

      {batchSel.size>0&&!allocMode&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.ink,zIndex:50,padding:"14px 16px",boxShadow:"0 -4px 20px rgba(0,0,0,0.3)"}}>
          <div style={{maxWidth:640,margin:"0 auto"}}>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginBottom:10}}>已選 <strong style={{color:"#fff"}}>{batchSel.size}</strong> 筆，設定訂購日後按套用</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"rgba(255,255,255,0.7)",fontSize:12,width:60,flexShrink:0}}>首次訂購日</span>
                <input type="date" value={batchDate1} onChange={e=>setBatchDate1(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"8px 10px",fontSize:14,color:"#fff"}}/>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,firstOrderDate:batchDate1}:it);scheduleSave(next);return next;});setBatchDate1("");}} style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>套用</button>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,firstOrderDate:""}:it);scheduleSave(next);return next;});}} style={{background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"8px 10px",fontSize:12,cursor:"pointer",flexShrink:0}}>清除</button>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"rgba(255,255,255,0.7)",fontSize:12,width:60,flexShrink:0}}>二次訂購日</span>
                <input type="date" value={batchDate2} onChange={e=>setBatchDate2(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"8px 10px",fontSize:14,color:"#fff"}}/>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,secondOrderDate:batchDate2}:it);scheduleSave(next);return next;});setBatchDate2("");}} style={{background:C.stamp,color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>套用</button>
                <button onClick={()=>{setItems(prev=>{const next=prev.map(it=>batchSel.has(it.id)?{...it,secondOrderDate:""}:it);scheduleSave(next);return next;});}} style={{background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"8px 10px",fontSize:12,cursor:"pointer",flexShrink:0}}>清除</button>
              </div>
              <button onClick={()=>{setBatchSel(new Set());setBatchDate1("");setBatchDate2("");}} style={{background:"transparent",color:"rgba(255,255,255,0.5)",border:"none",padding:"4px",fontSize:13,cursor:"pointer",textAlign:"center"}}>取消選取</button>
            </div>
          </div>
        </div>
      )}
      {/* 需求彙總（底部）*/}
      {summaryData.length>0&&(
        <div style={{background:C.surface,border:`1px solid ${C.line}`,borderRadius:14,padding:"14px 16px",margin:"16px 0"}}>
          <div style={{fontSize:12,fontWeight:700,color:C.inkMuted,marginBottom:10}}>📋 需求彙總</div>
          {summaryData.map(({prod,prodTotal,variants})=>(
            <div key={prod} style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.inkMuted,marginBottom:4}}>{prod} <span style={{fontWeight:400}}>共{prodTotal}件</span></div>
              {variants.map(({vk,szKeys,sg,total,allOrdered,anyOrdered,grpIds,szDone})=>{
                const color=allOrdered?C.success:anyOrdered?C.orange:C.ink;
                const bg=allOrdered?"#d4edda":anyOrdered?"#fff3e0":C.stripe;
                const canArrive=!allOrdered;
                const handleGroupArrive=()=>{
                  if(!window.confirm(`確認「${vk||prod}」共${total}件全數到貨？`))return;
                  const now=new Date().toISOString();
                  setItems(prev=>{
                    const next=prev.map(it=>{
                      if(!grpIds.includes(it.id))return it;
                      const maxQ=it.orderedQty!=null?it.orderedQty:it.qty;
                      return{...it,allArrived:true,arrivedQty:maxQ,arrivedTs:it.arrivedTs||now,firstArrivedDate:it.firstArrivedDate||now.slice(0,10)};
                    });
                    scheduleSave(next);
                    return next;
                  });
                };
                return(
                  <div key={vk||"_"} style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:4,marginBottom:4,opacity:allOrdered?0.5:1}}>
                    {vk&&<span style={{fontSize:12,fontWeight:600,color,minWidth:80,textDecoration:allOrdered?"line-through":"none"}}>{vk}</span>}
                    {szKeys.map(sz=>(<span key={sz} style={{background:szDone[sz]?"#d4edda":bg,borderRadius:12,padding:"2px 7px",fontSize:11,color:szDone[sz]?C.success:color}}>{sz}×{sg[sz]}</span>))}
                    <span style={{fontSize:11,color:C.inkMuted}}>共{total}件</span>
                    {canArrive&&<button onClick={handleGroupArrive} style={{marginLeft:"auto",fontSize:11,padding:"2px 8px",borderRadius:10,border:`1px solid ${C.success}`,background:"#f0faf4",color:C.success,cursor:"pointer"}}>全數到貨</button>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
      {/* 置頂按鈕 */}
      <button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
        style={{position:"fixed",bottom:24,right:20,width:44,height:44,borderRadius:22,
          background:C.ink,color:"#fff",border:"none",fontSize:20,cursor:"pointer",
          boxShadow:"0 2px 10px rgba(0,0,0,0.25)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
        ↑
      </button>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null,info:null};}
  static getDerivedStateFromError(err){return{err:err};}
  componentDidCatch(err,info){this.setState({err:err,info:info});}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{whiteSpace:'pre-wrap',padding:20,color:'#b91c1c',fontFamily:'monospace',fontSize:13}},
        '畫面錯誤：\n'+String((this.state.err&&this.state.err.message)||this.state.err)+'\n\n'+((this.state.err&&this.state.err.stack)||'')+'\n\n元件位置：'+((this.state.info&&this.state.info.componentStack)||''));
    }
    return this.props.children;
  }
}
try{const root=ReactDOM.createRoot(document.getElementById("root"));root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));}catch(err){document.body.innerHTML='<div style="white-space:pre-wrap;padding:20px;color:#b91c1c;font-family:monospace;font-size:13px;">Render錯誤：\n'+(err&&err.stack?err.stack:String(err))+'</div>';}
</script>
</body>
</html>
