<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const C={
  bg:"#F5F3EE",surface:"#FFFFFF",stamp:"#B44635",ink:"#2D2416",
  inkMuted:"#7A6E5E",line:"#E5E0D5",stripe:"#FAF8F5",
  info:"#1D6FA3",infoSoft:"#EFF6FC",
  success:"#2D7D46",successSoft:"#EBF5EE",
  warning:"#92400E",warningSoft:"#FFF8ED",
  orange:"#E65100",orangeSoft:"#FFF3E0",
};
const GIST_FILE="stock-tracker-data.json";

// ── 工具 ──
function genId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function itemKey(it){return[it.product,it.color,it.size,it.style].join("|||");}
// 正規化 key：把 / 和多餘空白統一，用於跨 CSV 格式比對
function nkStr(s){return String(s||"").replace(/｜/g,"|").replace(/\//g," ").replace(/\s+/g," ").trim().toLowerCase();}
function normalizedKey(it){return[it.product,it.color,it.size,it.style].map(nkStr).join("|||");}
// flatKey：終極模糊比對；style 去括號後比對，避免選項在括號內被省略
// 還需要的數量：orderedQty 為 0 是合法值，不可用 || 退回 qty（0 是 falsy）
function needQty(it){return it.orderedQty!=null?it.orderedQty:(it.qty||0);}
function normProdName(s){
  let v=String(s||"");
  v=v.replace(/\s*[（(][^/／）)]*[）)]\s*$/,"").trim();   // 結尾完整括號註記（不含斜線）
  v=v.replace(/\s*[（(][^）)]*$/,"").trim();              // 結尾未閉合括號（CSV 逗號切斷造成）
  return v||String(s||"");
}
// 顯示用商品名：只剝掉「給客人看的提示語」括號（自行加入/未滿額/加購下單…），
// 保留款式類括號（Ｖ款/全包款/粗肩細肩），否則會分不出款式
function displayProd(s){
  const v=String(s||"");
  var lp=Math.max(v.lastIndexOf("（"),v.lastIndexOf("("));
  if(lp<0)return v;
  var head=v.slice(0,lp).trim();
  var tail=v.slice(lp+1).split("）").join("").split(")").join("").trim();
  var NOTE=/自行加入|未滿額|會刪除|加購下單|也在這|備註/;
  if(NOTE.test(tail)&&head)return head;
  return v;
}
function dispName(it){return [displayProd(it.product),it.color,it.size,it.style].filter(Boolean).join(" ");}
function flatKey(it){
  const ns=s=>String(s||"")
    .replace(/(?:女裝|男裝|兒童|童裝|女童|男童)?(?:顏色|尺寸|尺碼|身高|體重|規格|款式|全尺碼)[:：]/g,"")
    .replace(/[｜|\/_:：\s\-·（）()【】\u3000\u3001\u3002＊＋]/g,"")
    .toLowerCase();
  // 商品名先剝掉「結尾且不含斜線」的括號註記，讓備貨清單與訂單兩邊一致
  const p=ns(normProdName(it.product)),c=ns(it.color),z=ns(it.size),st=ns(it.style);
  const pNoParens=ns(String(it.product||"").replace(/[（(][^）)]*[）)]/g,""));
  const stAdd=st&&!pNoParens.includes(st)?st:"";
  return p+c+z+stAdd;
}
// 打勾狀態的 key：同一訂單若有多個相同 SKU（客人分開下單同款式，
// 在同一張訂單重複買了完全相同的商品），用「第幾次出現」區分打勾狀態，
// 避免打勾/出貨互相牽連（否則勾一件會連帶另一件也被視為已裝袋、一起出貨）
function packKeyOf(allocItems,item){
  const sku=flatKey(item);
  let dup=0;
  for(const x of allocItems){
    if(x===item)break;
    if(x.allocatedQty>0&&flatKey(x)===sku)dup++;
  }
  return dup>0?sku+"#"+dup:sku;
}
// 單件識別碼：同一筆 item（allocatedQty 可能>1）拆成每件獨立的 key，
// 這樣打勾/出貨才能精確到「這一件」，不會因為顯示成 ×N 而混淆進度
function unitPackKey(allocItems,item,unitIdx){
  return packKeyOf(allocItems,item)+"#u"+unitIdx;
}
function custKey(ci){return String(ci.orderNo||"")+"|"+String(ci.prod||"")+"|"+String(ci.spec1||"")+"|"+String(ci.spec2||"");}
function custToItem(ci){return {product:ci.prod,color:"",size:"",style:[ci.spec1,ci.spec2].filter(Boolean).join(" "),allocatedQty:1,isCustom:true,custKey:custKey(ci)};}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtSavedTime(d){if(!d)return"";return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function fmtTs(ts){if(!ts)return"";const d=new Date(ts);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function daysSince(dateStr){if(!dateStr||isNaN(new Date(dateStr)))return null;return Math.floor((new Date(todayStr())-new Date(dateStr))/(864e5));}
function isLateOrder(it){if(it.allOrdered||it.allArrived||it.firstOrderDate)return false;const d=daysSince(it.importedAt);return d!==null&&d>3;}
function isLateArrival(it){if(it.allArrived||!it.firstOrderDate)return false;const d=daysSince(it.firstOrderDate);return d!==null&&d>14;}
// 尺寸排序：S→M→L→XL→2XL，童裝 80→90→100→130
const SIZE_ORDER=["XS","S","M","L","XL","XXL","2XL","3XL","4XL","F","FREE"];
function sizeOrder(s){
  const u=String(s||"").toUpperCase().trim();
  const i=SIZE_ORDER.indexOf(u);if(i>=0)return i;
  const n=parseInt(s,10);if(!isNaN(n))return 100+n;
  return 9999;
}
// 去掉款式結尾的顏色詞，取得基底款式名（如「牛仔小個白」→「牛仔小個」）
const COLOR_SUFFIXES=["深灰","灰綠","藏青","卡其","橘紅","白","黑","藍","灰","紅","粉","綠","橘","紫","棕"];
function getBaseStyle(style){
  for(const c of COLOR_SUFFIXES){if(style.endsWith(c))return style.slice(0,-c.length);}
  return style;
}
function getGroupKey(it){
  if(!it.size)return it.product+"|||"+getBaseStyle(it.style||it.color||"");
  return it.product+"|||"+[it.style,it.color].filter(Boolean).join("·");
}
function getGroupLabel(it){
  if(!it.size)return getBaseStyle(it.style||it.color||"")||it.product;
  return [it.style,it.color].filter(Boolean).join(" ")||it.product;
}
function getSortSize(it){return sizeOrder(it.size||it.color);}
function sortPri(it){if(it.allArrived)return 4;if(it.allOrdered)return 3;if(it.firstOrderDate)return 2;return 1;}
const GROUP_LABEL={1:"📋 未開始訂貨",2:"🚚 訂貨中",3:"📦 全數訂完，待到貨",4:"✅ 已到貨"};
function makeOrderKey(customerKey,items){return customerKey+"||"+items.map(it=>itemKey(it)+"x"+it.qty).sort().join("|");}

// ── CSV 解析 ──
function parseLine(line){const out=[];let cur="",q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur="";}else cur+=ch;}out.push(cur);return out;}
function parseBakuCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.replace(/\r/g,"").split("\n").filter(Boolean);
  if(lines.length<2)return[];
  const hdr=parseLine(lines[0]).map(h=>h.trim());
  const ix=k=>hdr.findIndex(h=>h===k);
  const[pi,ci,si,sti,qi]=["商品名稱","顏色","尺寸","款式","數量"].map(ix);
  // 去掉商品名結尾無斜線的括號備注（如「商品名(內褲組也在這）」→「商品名」）
  const normProd=normProdName;
  const rawRows=lines.slice(1).map(line=>{const cols=parseLine(line).map(c=>c.trim());return{product:normProd(cols[pi]||""),color:cols[ci]||"",size:cols[si]||"",style:cols[sti]||"",qty:parseInt(cols[qi],10)||0};}).filter(r=>r.product);
  // 合併相同 key 的品項
  const merged={};
  rawRows.forEach(r=>{const k=[r.product,r.color,r.size,r.style].join("|||");if(!merged[k])merged[k]={...r};else merged[k].qty+=r.qty;});
  return Object.values(merged);
}

// ── 規格解析 ──
function normalizeStr(s){return String(s||"").replace(/\s+/g," ").trim();}
function parseAllocSpec(raw){
  const s=normalizeStr(raw).replace(/^規格選擇[:：]\s*/,"");
  if(!s)return{color:"",size:"",style:""};
  // 只在「/後面緊接中文字」的地方切，避免把 S/90-100 裡的斜線也切掉
  const segs=s.split(/\/(?=[\u4e00-\u9fff])/).map(x=>x.trim()).filter(Boolean);
  const colors=[],sizes=[],extras=[];
  segs.forEach(seg=>{const m=seg.match(/^(.+?)[:：](.+)$/);if(m){const k=m[1].trim(),v=m[2].trim();if(k.includes("顏色"))colors.push(v);else if(["尺寸","尺碼","身高","體重","全尺碼"].some(x=>k.includes(x)))sizes.push(v);else extras.push(`${k}:${v}`);}else extras.push(seg);});
  return{color:colors.join("/"),size:sizes.join("/"),style:extras.join("；")};
}

// ── SENBEI 訂單解析 ──
// hotsnet 匯出的 CSV 若商品名含逗號卻未加引號，會多切出欄位使後面全部位移。
// 偵測欄數超出表頭時，把多切的欄位併回商品名。
function fixShiftedRow(r,pi,hdrLen){
  if(!Array.isArray(r)||!hdrLen||pi==null||pi<0)return r;
  const extra=r.length-hdrLen;
  if(extra<=0)return r;
  const merged=r.slice(pi,pi+1+extra).map(x=>String(x==null?"":x)).join(",");
  return r.slice(0,pi).concat([merged],r.slice(pi+1+extra));
}
function parseSenbeiAOA(aoa){
  let mCols=null,dCols=null,dHdrLen=0;
  for(const r of aoa){
    if(!r||!r[0])continue;
    const c0=normalizeStr(String(r[0]));
    if(c0.includes("表頭")&&c0.includes("M")){const m={};r.forEach((v,i)=>{if(v)m[normalizeStr(String(v))]=i;});mCols={account:m["訂購人"]??1,name:m["收件人"]??2,amount:m["小計"]??m["總金額(含運)"]??m["總金額"]??-1};}
    if(c0.includes("明細")&&c0.includes("D")){const m={};r.forEach((v,i)=>{if(v)m[normalizeStr(String(v))]=i;});const sk=Object.keys(m).find(k=>k.includes("規格"));dCols={product:m["商品名稱"]??1,qty:m["訂購數量"]??3,spec:sk?m[sk]:4};dHdrLen=r.length;}
    if(mCols&&dCols)break;
  }
  mCols=mCols||{account:1,name:2,amount:-1};
  dCols=dCols||{product:1,qty:3,spec:4};
  const customers={};const orders=[];let curOrder=null;
  aoa.forEach((r)=>{
    const c0=normalizeStr(String(r?.[0]??""));
    if(c0==="M"){
      const acc=normalizeStr(r[mCols.account]||"");const name=normalizeStr(r[mCols.name]||"");
      const amtStr=mCols.amount>=0?String(r[mCols.amount]||""):"0";
      const amount=parseFloat(amtStr.replace(/[^0-9.-]/g,""))||0;
      const key=acc||name;
      if(!customers[key])customers[key]={account:acc,name,totalAmount:0};
      customers[key].totalAmount+=amount;
      curOrder={orderRef:`${key}_${orders.length+1}`,customerKey:key,amount,items:[]};
      orders.push(curOrder);
    }else if(c0==="D"&&curOrder){
      r=fixShiftedRow(r,dCols.product,dHdrLen);
      let product=normalizeStr(r[dCols.product]||"");if(!product)return;
      const qty=parseInt(r[dCols.qty],10)||1;
      let specText=normalizeStr(r[dCols.spec]||"");
      if(!specText){const idx=product.lastIndexOf("_(");if(idx>=0&&product.endsWith(")")){specText=product.slice(idx+2,-1);product=product.slice(0,idx).trim();}}
      const{color,size,style}=parseAllocSpec(specText);
      curOrder.items.push({product,color,size,style,qty});
    }
  });
  return{customers,orders};
}

// ── 配貨演算法 ── 回傳 savedAlloc 格式
function computeAlloc(parsed,stockItems){
  const{customers,orders}=parsed;
  const stock={};
  stockItems.forEach(it=>{const fk=flatKey(it);stock[fk]=(stock[fk]||0)+Math.max(0,(it.arrivedQty||0)+(it.stockQty||0)-(it.shippedQty||0));});
  // 依客人總金額排序訂單
  const sorted=[...orders].sort((a,b)=>(customers[b.customerKey]?.totalAmount||0)-(customers[a.customerKey]?.totalAmount||0));
  const result={};
  sorted.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    const allocItems=[],waitingItems=[];
    o.items.forEach(item=>{
      const _k=flatKey(item);
      const rem=stock[_k]||0;
      const give=Math.min(item.qty,rem);if(give>0)stock[_k]=Math.max(0,rem-give);
      if(give>0)allocItems.push({...item,orderedQty:item.qty,allocatedQty:give});
      if(give<item.qty)waitingItems.push({...item,orderedQty:item.qty-give,allocatedQty:0,qty:item.qty-give});
    });
    result[oKey]={
      customerAccount:customers[o.customerKey]?.account||o.customerKey,
      customerName:customers[o.customerKey]?.name||"",
      orderAmount:o.amount,
      customerTotalAmount:customers[o.customerKey]?.totalAmount||0,
      orderIndex:sorted.indexOf(o)+1,
      allocItems,waitingItems,
      shippedAt:null,shippedOrderNo:null,
    };
  });
  return result;
}

// ── 比例分配演算法 ──
function computeProportionalAlloc(parsed,stockItems){
  const{customers,orders}=parsed;
  const stock={};
  stockItems.forEach(it=>{const fk=flatKey(it);stock[fk]=(stock[fk]||0)+Math.max(0,(it.arrivedQty||0)+(it.stockQty||0)-(it.shippedQty||0));});
  // 計算每個SKU的總訂購量
  const totalOrdered={};
  orders.forEach(o=>{o.items.forEach(item=>{const k=flatKey(item)||normalizedKey(item);totalOrdered[k]=(totalOrdered[k]||0)+item.qty;});});
  // 計算每個SKU的到貨比例（上限1）
  const ratio={};
  Object.keys(totalOrdered).forEach(k=>{ratio[k]=Math.min(1,(stock[k]||0)/(totalOrdered[k]||1));});
  // 第一輪：floor分配
  const orderFloors={};// oKey → {sku → {base, frac, item}}
  const baseSum={};// sku → 已分配底數總和
  orders.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    orderFloors[oKey]=o.items.map(item=>{
      const k=flatKey(item)||normalizedKey(item);const r=ratio[k]||0;
      const exact=item.qty*r;const base=Math.floor(exact);const frac=exact-base;
      baseSum[k]=(baseSum[k]||0)+base;
      return{sku:k,base,frac,item};
    });
  });
  // 第二輪：剩餘件數按小數點大小補給
  Object.keys(totalOrdered).forEach(sku=>{
    let remaining=(stock[sku]||0)-(baseSum[sku]||0);
    if(remaining<=0)return;
    const candidates=[];
    Object.entries(orderFloors).forEach(([oKey,slots])=>{slots.forEach((sl,idx)=>{if(sl.sku===sku&&sl.frac>0)candidates.push({oKey,idx,frac:sl.frac});});});
    candidates.sort((a,b)=>b.frac-a.frac);
    for(let i=0;i<Math.min(remaining,candidates.length);i++){orderFloors[candidates[i].oKey][candidates[i].idx].base+=1;}
  });
  // 組裝結果（依客人金額排序顯示）
  const sorted=[...orders].sort((a,b)=>(customers[b.customerKey]?.totalAmount||0)-(customers[a.customerKey]?.totalAmount||0));
  const result={};
  sorted.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    const allocItems=[],waitingItems=[];
    (orderFloors[oKey]||[]).forEach(slot=>{
      const item=slot.item;const allocQty=slot.base||0;
      if(allocQty>0)allocItems.push({...item,orderedQty:item.qty,allocatedQty:allocQty});
      if(allocQty<item.qty)waitingItems.push({...item,orderedQty:item.qty-allocQty,allocatedQty:0,qty:item.qty-allocQty});
    });
    result[oKey]={customerAccount:customers[o.customerKey]?.account||o.customerKey,customerName:customers[o.customerKey]?.name||"",orderAmount:o.amount,customerTotalAmount:customers[o.customerKey]?.totalAmount||0,orderIndex:sorted.indexOf(o)+1,allocItems,waitingItems,shippedAt:null,shippedOrderNo:null};
  });
  return result;
}
// ── 重新計算（已出貨訂單保留shipments，重算剩餘未出品項；未出貨訂單全部重算）──
function recalculateAlloc(currentAlloc,parsed,stockItems,method){
  const{customers,orders}=parsed;
  const stock={};
  stockItems.forEach(it=>{const fk=flatKey(it);stock[fk]=(stock[fk]||0)+Math.max(0,(it.arrivedQty||0)+(it.stockQty||0)-(it.shippedQty||0));});
  const shippedArr=[],unshippedArr=[];
  orders.forEach(o=>{
    const oKey=makeOrderKey(o.customerKey,o.items);
    const ex=currentAlloc[oKey];
    const isShip=ex&&(ex.shipments?.length>0||ex.shippedAt);
    if(isShip)shippedArr.push({o,oKey,ex});else unshippedArr.push(o);
  });
  const result={};
  // 已出貨訂單：依客人金額高低優先取得剩餘庫存，保留 shipments 歷史
  shippedArr.sort((a,b)=>(customers[b.o.customerKey]?.totalAmount||0)-(customers[a.o.customerKey]?.totalAmount||0));
  shippedArr.forEach(({o,oKey,ex})=>{
    // 計算每個SKU已出貨數量（從 shipments 陣列加總）
    const alreadyShipped={};
    (ex.shipments||[]).forEach(s=>{
      (s.items||[]).forEach(si=>{
        const fk=flatKey(si);
        alreadyShipped[fk]=(alreadyShipped[fk]||0)+(si.allocatedQty||0);
      });
    });
    const allocItems=[],waitingItems=[];
    // remainShipped：逐筆消耗的「剩餘已出貨額度」，避免同商品重複下單時，
    // 第2筆也被誤判成「已出過」而整個消失（alreadyShipped 是總量，不能每筆都拿去比對）
    const remainShipped={...alreadyShipped};
    o.items.forEach(item=>{
      const fk=flatKey(item);
      const shipped=Math.min(item.qty,remainShipped[fk]||0);
      remainShipped[fk]=(remainShipped[fk]||0)-shipped;
      const remaining=item.qty-shipped;
      if(remaining<=0)return; // 這一筆已出完，略過
      const rem=stock[fk]||0;
      const give=Math.min(remaining,rem);
      if(give>0)stock[fk]=Math.max(0,rem-give);
      if(give>0)allocItems.push({...item,orderedQty:item.qty,allocatedQty:give});
      if(give<remaining)waitingItems.push({...item,orderedQty:remaining-give,allocatedQty:0,qty:remaining-give});
    });
    result[oKey]={...ex,allocItems,waitingItems};
  });
  // 未出貨訂單：用剩餘庫存重新計算
  if(unshippedArr.length>0){
    const sub={customers,orders:unshippedArr};
    const fresh=method==="proportional"?computeProportionalAlloc(sub,stockItems):computeAlloc(sub,stockItems);
    Object.assign(result,fresh);
  }
  // 保留「已出貨但不在新檔」的訂單，避免昨日已出貨訂單因重匯而整筆消失（連出貨記錄一起不見）
  if(currentAlloc)Object.keys(currentAlloc).forEach(oKey=>{
    if(result[oKey])return; // 新檔已涵蓋
    const ex=currentAlloc[oKey];
    if(ex&&((ex.shipments&&ex.shipments.length>0)||ex.shippedAt))result[oKey]={...ex};
  });
  // 保留既有備註（重算會產生新物件，避免備註被洗掉）
  if(currentAlloc)Object.keys(result).forEach(k=>{if(currentAlloc[k]&&currentAlloc[k].note&&!result[k].note)result[k].note=currentAlloc[k].note;});
  return result;
}
// ── iOPEN XLS 解析 ──
function parseIopenXLS(aoa){
  try{
    if(!aoa||aoa.length<2)return{byIg:{},allCustom:[],unmatched:[]};
    var hdr=aoa[0].map(function(h){return String(h||'');});
    var col=function(k){return hdr.findIndex(function(h){return h.indexOf(k)>-1;});};
    var CO=col('\u8a02\u55ae\u7de8\u865f'),CP=col('\u5546\u54c1\u540d\u7a31'),CS=col('\u51fa\u8ca8\u55ae\u7de8\u865f');
    var CA=col('\u8a02\u55ae\u91d1\u984d'),CM=col('\u9580\u5e02\u540d\u7a31'),CST=col('\u8a02\u55ae\u72c0\u614b'),CN=col('\u5099\u8a3b');
    var CNM=col('\u6703\u54e1\u59d3\u540d');
    var CS1=hdr.findIndex(function(h){return h==='\u898f\u683c1';});
    var CS2=hdr.findIndex(function(h){return h==='\u898f\u683c2';});
    var CQ=hdr.findIndex(function(h){return h==='\u6578\u91cf';});
    var extractLiveIg=function(prod){
      var li=prod.indexOf('\u76f4\u64ad');if(li<0)return '';
      var lp=prod.indexOf('\uff08',li),lp2=prod.indexOf('(',li);
      var ls=(lp>-1&&(lp2===-1||lp<lp2))?lp:lp2;if(ls<0)return '';
      var rp=prod.indexOf('\uff09',ls),rp2=prod.indexOf(')',ls);
      var rs=(rp>-1&&(rp2===-1||rp<rp2))?rp:rp2;
      return rs>ls?prod.substring(ls+1,rs).trim():'';
    };
    // \u7b2c\u4e00\u8f2a\uff1a\u4ee5\u300c\u8a02\u55ae\u7de8\u865f\u300d\u70ba\u55ae\u4f4d\u5f59\u6574\uff0cIG \u53ea\u8981\u4efb\u4e00\u5217\u8fa8\u8b58\u51fa\u4f86\uff0c\u6574\u5f35\u8a02\u55ae\u5546\u54c1\u90fd\u6b78\u5c6c
    var orderMap={};
    for(var i=1;i<aoa.length;i++){
      var r=aoa[i];var st=String(r[CST]||'');
      if(st.indexOf('\u53d6\u6d88')>-1||st.indexOf('\u9000\u6b3e')>-1||st.indexOf('\u9000\u8ca8')>-1)continue;
      var orderNo=String(r[CO]||'').trim();if(!orderNo)continue;
      var prod=String(r[CP]||'').trim(),note=String(r[CN]||'').trim();
      var shipNo=String(r[CS]||'').trim(),store=String(r[CM]||'').trim();
      var amt=parseFloat(r[CA])||0;
      var spec1=CS1>=0?String(r[CS1]||'').trim():'',spec2=CS2>=0?String(r[CS2]||'').trim():'';
      if(!orderMap[orderNo])orderMap[orderNo]={igLive:'',igNote:'',store:'',shipNo:'',amount:0,name:'',rows:[]};
      var om=orderMap[orderNo];
      var nm=CNM>=0?String(r[CNM]||'').trim():'';if(nm&&!om.name)om.name=nm;
      var liveIg=extractLiveIg(prod);
      if(liveIg)om.igLive=liveIg;
      if(!om.igNote&&note&&note.length<=30&&note.indexOf(' ')===-1&&note.indexOf('\uff0c')===-1&&note.indexOf(',')===-1)om.igNote=note;
      if(amt&&!om.amount)om.amount=amt;
      if(store&&!om.store)om.store=store;
      if(shipNo&&!om.shipNo)om.shipNo=shipNo;
      om.rows.push({prod:prod,spec1:spec1,spec2:spec2,shipNo:shipNo,qty:(CQ>=0?(parseInt(r[CQ],10)||1):1),isLiveMarker:liveIg.length>0});
    }
    // \u7b2c\u4e8c\u8f2a\uff1a\u7d44 byIg\uff08\u975e\u76f4\u64ad\u884c\u7684\u5546\u54c1\u5217\u70ba\u5ba2\u8a02\u54c1\u9805\uff09
    var byIg={},allCustom=[],unmatched=[],oAmt={};
    Object.keys(orderMap).forEach(function(orderNo){
      var om=orderMap[orderNo];var ig=om.igLive||om.igNote;
      if(!ig){
        var up=[],useen={};
        om.rows.forEach(function(row){
          if(row.isLiveMarker||!row.prod||row.prod.indexOf('\u904b\u8cbb')>-1)return;
          var uk=row.prod+'|'+row.spec1+'|'+row.spec2;
          if(useen[uk]){useen[uk].qty+=(row.qty||1);return;}
          var o={prod:row.prod,spec1:row.spec1,spec2:row.spec2,qty:(row.qty||1)};
          useen[uk]=o;up.push(o);
        });
        if(up.length)unmatched.push({orderNo:orderNo,store:om.store,amount:om.amount,name:om.name||'',items:up});
        return;
      }
      oAmt[orderNo]=om.amount;
      if(!byIg[ig])byIg[ig]={orders:[],customItems:[],totalSpend:0,needGift:false};
      var dup=false;for(var q=0;q<byIg[ig].orders.length;q++)if(byIg[ig].orders[q].orderNo===orderNo)dup=true;
      if(!dup)byIg[ig].orders.push({orderNo:orderNo,shipNo:om.shipNo,store:om.store,amount:om.amount});
      var seen={};
      om.rows.forEach(function(row){
        if(row.isLiveMarker||!row.prod||row.prod.indexOf('\u904b\u8cbb')>-1)return;
        var k=row.prod+'|'+row.spec1+'|'+row.spec2;
        if(seen[k]){seen[k].qty+=(row.qty||1);return;}
        var item={ig:ig,orderNo:orderNo,shipNo:row.shipNo,prod:row.prod,spec1:row.spec1,spec2:row.spec2,qty:(row.qty||1)};
        seen[k]=item;
        byIg[ig].customItems.push(item);allCustom.push(item);
      });
    });
    Object.keys(byIg).forEach(function(ig){var d=byIg[ig],tot=0;for(var k=0;k<d.orders.length;k++)tot+=oAmt[d.orders[k].orderNo]||0;d.totalSpend=tot;d.needGift=tot>=3500;});
    return{byIg:byIg,allCustom:allCustom,unmatched:unmatched};
  }catch(e){console.error('parseIopenXLS:',e);return{byIg:{},allCustom:[],unmatched:[]};}
}

async function gFetch(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github.v3+json"}});
  if(!r.ok)throw new Error(`無法讀取 (HTTP ${r.status})`);
  const d=await r.json();const content=d.files[GIST_FILE]?.content;
  try{const p=JSON.parse(content||"{}");return{items:(p.items||[]).map(migrateItem),savedAlloc:p.savedAlloc||null,iopenCustom:p.iopenCustom||[],iopenData:p.iopenData||{}};}catch{return{items:[],savedAlloc:null,iopenCustom:[],iopenData:{}};}
}
async function gSave(token,gistId,items,savedAlloc,iopenCustom,iopenData){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify({items,savedAlloc,iopenCustom:iopenCustom||[],iopenData:iopenData||{}},null,2)}}})});
  if(!r.ok)throw new Error(`儲存失敗 (HTTP ${r.status})`);
}
async function gCreate(token){
  const r=await fetch("https://api.github.com/gists",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({description:"備貨追蹤 - 理貨台",public:false,files:{[GIST_FILE]:{content:JSON.stringify({items:[],savedAlloc:null,iopenCustom:[],iopenData:{}})}}})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`建立失敗 (${r.status})：${e.message||"請確認Token是否有gist權限"}`);}
  return(await r.json()).id;
}
function migrateItem(it){
  const _stock=it.stockQty||0;
  const _arrived=it.arrivedQty>0?it.arrivedQty:(it.allArrived?(it.orderedQty!=null?it.orderedQty:it.qty):(it.arrived?it.qty:0));
  // 已出貨不得超過（已到貨＋現貨）；修復舊版撤銷未回退留下的孤兒數字
  const _shipped=Math.max(0,Math.min(it.shippedQty||0,(_arrived||0)+_stock));
  return{...it,stockQty:_stock,firstOrderDate:it.firstOrderDate||it.supplierOrderDate||"",secondOrderDate:it.secondOrderDate||"",allOrdered:it.allOrdered||false,orderedQty:it.orderedQty!=null?it.orderedQty:it.qty,arrivedQty:_arrived,shippedQty:_shipped,allArrived:it.allArrived||it.arrived||false,arrivedTs:it.arrivedTs||"",firstArrivedTs:it.firstArrivedTs||"",importedAt:it.importedAt||it.orderDate||todayStr()};
}
// 從 iopenData 收集所有客訂商品（含未歸屬），過濾運費/湊卷等非實體品項
function iopenCustomFromData(d){
  var out=[];
  var push=function(prod,spec1,spec2,qty){var p=(prod||"").trim();if(!p||p==="運費"||p.indexOf("湊卷")>-1||p.indexOf("自願使用無退款")>-1)return;out.push({prod:p,spec1:spec1||"",spec2:spec2||"",qty:qty||1});};
  Object.keys(d||{}).forEach(function(ig){
    if(ig==="__reship__")return;
    if(ig==="__unmatched__"){(d.__unmatched__||[]).forEach(function(u){(u.items||[]).forEach(function(it){push(it.prod,it.spec1,it.spec2,it.qty);});});return;}
    var t=d[ig];if(t&&t.customItems)t.customItems.forEach(function(c){push(c.prod,c.spec1,c.spec2,c.qty);});
  });
  return out;
}
// 把客訂商品併入主 items（依 SKU 聚合計數；只加「不存在的」新 SKU，既有品項不動以保留訂貨/到貨進度）
function mergeCustomIntoItems(currentItems,custList){
  if(!custList||!custList.length)return currentItems||[];
  var agg={};
  custList.forEach(function(c){var sku=c.prod+"|"+(c.spec1||"")+"|"+(c.spec2||"");if(!agg[sku])agg[sku]={product:c.prod,color:c.spec1||"",size:c.spec2||"",qty:0};agg[sku].qty+=(c.qty||1);});
  var have={};(currentItems||[]).forEach(function(it){have[(it.product||"")+"|"+(it.color||"")+"|"+(it.size||"")+"|"+(it.style||"")]=1;});
  var added=[];
  Object.keys(agg).forEach(function(sku){var a=agg[sku];var k=a.product+"|"+a.color+"|"+a.size+"|";if(have[k])return;have[k]=1;added.push(migrateItem({id:"cust_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7),product:a.product,color:a.color,size:a.size,style:"",qty:a.qty,isCustomStock:true}));});
  return added.length?(currentItems||[]).concat(added):(currentItems||[]);
}

          <div style={{display:"flex",gap:4}}>
            <input type="date" value={d2} onChange={e=>setD2(e.target.value)} onBlur={e=>{if(e.target.value&&e.target.value!==it.secondOrderDate)onUpdate("secondOrderDate",e.target.value);}} disabled={!!it.allOrdered} style={{flex:1,border:`1px solid ${it.allOrdered?"transparent":C.line}`,borderRadius:8,padding:"6px 8px",fontSize:13,color:it.allOrdered?C.inkMuted:C.ink,background:it.allOrdered?"transparent":C.bg,minWidth:0,opacity:it.allOrdered?0.6:1}}/>

      </div>
      <div style={{paddingLeft:32,borderTop:`1px solid ${C.line}`,paddingTop:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#059669",fontSize:12}}>現貨</span><input type="number" min="0" value={it.stockQty||0} onChange={e=>onUpdate("stockQty",Math.max(0,parseInt(e.target.value,10)||0))} style={{width:46,border:"1px solid #059669",borderRadius:8,padding:"5px 4px",fontSize:13,textAlign:"center",background:"#F0FFF4",color:"#059669",fontWeight:600}}/></div><span style={{color:C.inkMuted,fontSize:11,margin:"0 4px"}}>|</span><span style={{color:C.inkMuted,fontSize:12}}>已到貨</span>
            <input type="number" min="0" value={it.arrivedQty||0} onChange={e=>handleArrivedQty(e.target.value)} style={{width:52,border:`1px solid ${C.line}`,borderRadius:8,padding:"5px 6px",fontSize:14,textAlign:"center",background:C.bg,color:C.ink}}/>
            <span style={{color:C.inkMuted,fontSize:12}}>/ {it.orderedQty!=null?it.orderedQty:it.qty} 件</span>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
            <input type="checkbox" checked={!!it.allArrived} onChange={e=>handleAllArrived(e.target.checked)} style={{width:26,height:26,cursor:"pointer",accentColor:C.success}}/>
            <span style={{fontSize:13,color:it.allArrived?C.success:C.inkMuted,fontWeight:it.allArrived?"600":"400"}}>{it.allArrived?"✅ 全數到貨":"全數到貨"}</span>
          </label>
          {it.arrivedTs&&<span style={{color:C.success,fontSize:11}}>{fmtTs(it.arrivedTs)}</span>}
        </div>
        {shippedQty>0&&<div style={{fontSize:11,color:fullyShipped?C.success:C.orange,marginTop:4}}>📦 已出貨 {shippedQty} 件{fullyShipped?" (全部出完)":` / 剩餘可配 ${arrivedQty-shippedQty} 件`}</div>}
        {it.arrivedQty>0&&!it.allArrived&&(<div style={{color:C.orange,fontSize:11,marginTop:4,display:"flex",gap:8}}><span>⚡ 部分到貨：{it.arrivedQty}/{it.orderedQty!=null?it.orderedQty:it.qty} 件</span>{it.firstArrivedTs&&<span style={{color:C.inkMuted}}>首次 {fmtTs(it.firstArrivedTs)}</span>}</div>)}
      </div>
    </div>
  );
}

// ── 配貨視圖 ──
function buildShipNotice(orderNo,store,prods){
  var t=new Date().toLocaleDateString("zh-TW");
  return "您好～這是出貨通知\n"+(orderNo||"")+"\n"+prods.join("\n")+(prods.length?"\n":"")+"於今日"+t+"已寄出\n至您下單指定的"+(store||"")+"\n2-3天後即到門市\n請務必記得留意簡訊呦\n3天後簡訊沒有收到的話建議致電門市詢問\n\u203c\ufe0f超商有無發簡訊我們無法知曉，再麻煩媽咪記得到超商詢問一下呦\n\u203c\ufe0f如若未取貨，訂單原始金額+退回運費38+純取運費60=匯款金額，未取貨請48H內完成匯款\n（未取貨訂單等同訂單卷失效）";
}
function AllocationView({items,savedAlloc,onClose,onSaveAlloc,onConfirmShipment,onRevokeShipment,onUnarrive,onArrive,iopenData,onSaveIopen}){
  const[editAlloc,setEditAlloc]=useState(savedAlloc||null);
  const[allocMethod,setAllocMethod]=useState("amount"); // "amount" | "proportional"
  const[parsedCSV,setParsedCSV]=useState(null); // 暫存解析後的CSV，模式切換時重新計算
  const[fileName,setFileName]=useState("");
  const[err,setErr]=useState("");
  const[editingKey,setEditingKey]=useState(null);
  const[allocSearch,setAllocSearch]=useState("");
  const[catFilter,setCatFilter]=useState("live");
  const[copiedKey,setCopiedKey]=useState("");
  const[editingNote,setEditingNote]=useState("");
  const[noteInputs,setNoteInputs]=useState({});
  const[shipInputs,setShipInputs]=useState({});
  const[packed,setPacked]=useState({});  // 裝袋標記：key = oKey|sku
  const togglePacked=(oKey,sku)=>setPacked(p=>({...p,[oKey+"|"+sku]:!p[oKey+"|"+sku]}));
  function saveNote(oKey,text){setEditAlloc(prev=>{if(!prev||!prev[oKey])return prev;const next={...prev,[oKey]:{...prev[oKey],note:text}};onSaveAlloc(next);return next;});}
  const iopenFileRef=useRef(null);
  const[iopenXlsName,setIopenXlsName]=useState("");
  const[showIopen,setShowIopen]=useState(false);
  const fileRef=useRef(null);

  useEffect(()=>{if(savedAlloc&&!editAlloc){setEditAlloc(savedAlloc);}
  },[savedAlloc]);

  // 模式切換時重新計算
  useEffect(()=>{
    if(!parsedCSV)return;
    recompute(parsedCSV,allocMethod);
  },[allocMethod]);

  function recompute(parsed,method){
    // 用 recalculateAlloc 確保已出貨訂單（含 shipments 陣列）完整保留
    const next=recalculateAlloc(editAlloc||{},parsed,items,method);
    setEditAlloc(next);onSaveAlloc(next);
  }

  // 計算每個SKU的可用庫存（arrivedQty - shippedQty）
  // 不同批次出貨用不同顏色
  const SHIP_COLORS=[
    {bg:C.successSoft,color:C.success,border:C.success},      // 第1次：綠
    {bg:C.infoSoft,color:C.info,border:C.info},               // 第2次：藍
    {bg:C.orangeSoft,color:C.orange,border:"#FFB74D"},        // 第3次：橙
    {bg:C.warningSoft,color:C.warning,border:C.warning},      // 第4次：咖
    {bg:"#F3E8FF",color:"#7C3AED",border:"#A78BFA"},          // 第5次+：紫
  ];
  function shipColor(idx){return SHIP_COLORS[Math.min(idx,SHIP_COLORS.length-1)];}
  const stockMap=useMemo(()=>{
    const m={};items.forEach(it=>{const fk=flatKey(it);m[fk]=(m[fk]||0)+Math.max(0,(it.arrivedQty||0)+(it.stockQty||0)-(it.shippedQty||0));});return m;
  },[items]);

  // 計算目前editAlloc中每個SKU已分配出去的總數
  function computeAllocUsage(alloc,excludeKey){
    const usage={};
    Object.entries(alloc||{}).forEach(([k,o])=>{
      if(k===excludeKey)return;
      o.allocItems.forEach(it=>{const fk=flatKey(it);usage[fk]=(usage[fk]||0)+it.allocatedQty;});
    });
    return usage;
  }

  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    setFileName(f.name);setErr("");
    const reader=new FileReader();
    reader.onload=ev=>{
      let text=ev.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      const aoa=text.replace(/\r/g,"").split("\n").filter(Boolean).map(l=>parseLine(l));
      const parsed=parseSenbeiAOA(aoa);
      if(!parsed.orders||!parsed.orders.length){setErr("找不到訂單資料，請確認這是SENBEI匯出的CSV（含M/D開頭的列）");return;}
      setParsedCSV(parsed);
      recompute(parsed,allocMethod);
    };
    reader.readAsText(f,"utf-8");
    e.target.value="";
  }

  function updateAllocQty(oKey,sku,delta,targetPackKey){
    const usage=computeAllocUsage(editAlloc,oKey);
    const available=Math.max(0,(stockMap[sku]||0)-(usage[sku]||0)); // sku 是 normalizedKey，僅用來查庫存
    setEditAlloc(prev=>{
      const order={...prev[oKey]};
      let allocItems=[...order.allocItems];
      // 精確定位「使用者點的是哪一筆」：優先用 targetPackKey（可消歧重複SKU），
      // 沒給的話才退回用 sku 比對（維持舊呼叫方式相容，但重複SKU時可能誤中多筆，
      // 因此凡是會動到 allocItems 的呼叫端都應該帶入 targetPackKey）
      const matchOne=(it)=>targetPackKey?packKeyOf(order.allocItems,it)===targetPackKey:(flatKey(it)===sku||normalizedKey(it)===sku||itemKey(it)===sku);
      let item=allocItems.find(matchOne);
      if(!item&&delta>0){
        const wi=order.waitingItems.find(it=>flatKey(it)===sku||normalizedKey(it)===sku||itemKey(it)===sku);
        if(wi){item={...wi,allocatedQty:0};allocItems=[...allocItems,item];order.allocItems=allocItems;}
      }
      if(!item)return prev;
      const maxByOrder=item.orderedQty!=null?item.orderedQty:(item.qty!=null?item.qty:999); // 不可超過這一筆的訂購數量
      const newQty=Math.max(0,Math.min(available+item.allocatedQty,maxByOrder,item.allocatedQty+delta));
      // 只更新「這一筆」（用物件參照比對，不是用 flatKey，避免誤傷同SKU的其他筆）
      const newAllocItems=order.allocItems.map(it=>it===item?{...it,allocatedQty:newQty}:it);
      const diff=item.allocatedQty-newQty;
      let newWaitingItems=[...order.waitingItems];
      const matchSku=(it)=>{const fk=flatKey(it);return fk===sku||normalizedKey(it)===sku||itemKey(it)===sku;};
      if(diff>0){
        const existing=newWaitingItems.find(it=>matchSku(it));
        if(existing)newWaitingItems=newWaitingItems.map(it=>it===existing?{...it,orderedQty:(needQty(it))+diff}:it);
        else newWaitingItems.push({...item,allocatedQty:0,orderedQty:diff,qty:diff});
      }else if(diff<0){
        // 從waiting取回；同SKU可能有多筆待補，依序扣減即可（waiting本身不分是哪一筆，數量對即可）
        let need=Math.abs(diff);
        newWaitingItems=newWaitingItems.map(it=>{
          if(need>0&&matchSku(it)&&(needQty(it))>0){const take=Math.min(need,(needQty(it)));need-=take;return{...it,orderedQty:(needQty(it))-take};}
          return it;
        }).filter(it=>(needQty(it))>0);
      }
      const next={...prev,[oKey]:{...order,allocItems:newAllocItems,waitingItems:newWaitingItems}};
      onSaveAlloc(next);
      return next;
    });
  }

  function confirmShipment(oKey,orderNo){
    setEditAlloc(prev=>{
      const order=prev[oKey];
      // 只出貨「已打勾裝袋」的件數；用單件(unit)為粒度計算，
      // 一筆 allocatedQty=2 的商品若只勾了1件，會被拆成「出貨1件、留1件繼續等打包」
      const shippedItems=[],remainItems=[];
      order.allocItems.forEach(it=>{
        if(!(it.allocatedQty>0)){remainItems.push(it);return;}
        let packedUnits=0;
        for(let u=0;u<it.allocatedQty;u++){if(packed[oKey+"|"+unitPackKey(order.allocItems,it,u)])packedUnits++;}
        if(packedUnits<=0){remainItems.push(it);return;}
        if(packedUnits>=it.allocatedQty){shippedItems.push(it);}
        else{shippedItems.push({...it,allocatedQty:packedUnits});remainItems.push({...it,allocatedQty:it.allocatedQty-packedUnits});}
      });
      const _acc=String(order.customerAccount||"").toLowerCase();
      const _info=iopenLC[_acc];
      // 併入已勾選的客訂品項
      const custShipped=[];const newShippedCI=(order.shippedCI||[]).slice();
      if(_info&&_info.customItems)_info.customItems.forEach(ci=>{const ck=custKey(ci);if(newShippedCI.indexOf(ck)>-1)return;if(packed[oKey+"|CI|"+ck]){custShipped.push(custToItem(ci));newShippedCI.push(ck);}});
      if(shippedItems.length===0&&custShipped.length===0)return prev; // 一件都沒勾就不動作
      const _iord=_info&&_info.orders&&_info.orders.find(x=>String(x.orderNo)===String(orderNo));
      const newShipment={orderNo,shippedAt:new Date().toISOString(),items:shippedItems.concat(custShipped),store:_iord?_iord.store:"",amount:_iord?_iord.amount:0};
      const existingShipments=order.shipments||(order.shippedAt?[{orderNo:order.shippedOrderNo,shippedAt:order.shippedAt,items:order.allocItems}]:[]);
      const next={...prev,[oKey]:{...order,
        allocItems:remainItems,
        shipments:[...existingShipments,newShipment],
        shippedCI:newShippedCI,
        shippedAt:null,shippedOrderNo:null,
      }};
      onSaveAlloc(next);
      onConfirmShipment(oKey,shippedItems,next); // 明確傳遞最新 alloc，避免閉包舊值
      return next;
    });
    setShipInputs(p=>({...p,[oKey]:""}));
    setPacked(p=>{const n={...p};Object.keys(n).forEach(k=>{if(k.indexOf(oKey+"|")===0)delete n[k];});return n;});
  }

  function toggleUnmatchedNotified(orderNo){
    const nd=JSON.parse(JSON.stringify(iopenData||{}));
    const t=(nd.__unmatched__||[]).find(u=>String(u.orderNo)===String(orderNo));
    if(t)t.notified=!t.notified;
    onSaveIopen(nd);
  }
  function shipUnmatched(orderNo){
    const nd=JSON.parse(JSON.stringify(iopenData||{}));
    const t=(nd.__unmatched__||[]).find(u=>String(u.orderNo)===String(orderNo));
    if(t){t.shipped=true;t.shippedAt=new Date().toISOString();}
    onSaveIopen(nd);
    setPacked(p=>{const n={...p};Object.keys(n).forEach(k=>{if(k.indexOf("UM|"+orderNo+"|")===0)delete n[k];});return n;});
  }
  function revokeUnmatched(orderNo){
    const nd=JSON.parse(JSON.stringify(iopenData||{}));
    const t=(nd.__unmatched__||[]).find(u=>String(u.orderNo)===String(orderNo));
    if(t){t.shipped=false;t.shippedAt=null;}
    onSaveIopen(nd);
  }

  // 待補貨品項改標為已到貨：移到可出貨，並連動備貨中心到貨數 +1
  // ── 額外補寄 ──
  function reshipList(){return (iopenData&&iopenData.__reship__)||[];}
  function saveReship(next){
    const nd=JSON.parse(JSON.stringify(iopenData||{}));
    nd.__reship__=next;
    onSaveIopen(nd);
  }
  function addReship(account,name,item,qty){
    const cur=reshipList();
    const rec={id:"rs_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,6),
      account:account||"",name:name||"",prod:dispName(item),qty:qty||1,
      method:"store",store:"",address:"",recipient:name||"",phone:"",shipNo:"",
      notified:false,shipped:false,createdAt:new Date().toISOString(),shippedAt:null};
    saveReship([...cur,rec]);
  }
  function updateReship(id,patch){
    saveReship(reshipList().map(r=>r.id===id?{...r,...patch}:r));
  }
  function removeReship(id){
    saveReship(reshipList().filter(r=>r.id!==id));
  }

  function markArrivedFromWaiting(oKey,item){
    setEditAlloc(prev=>{
      const order=prev[oKey];if(!order)return prev;
      const newWaiting=(order.waitingItems||[]).map(it=>{if(itemKey(it)!==itemKey(item))return it;const n=Math.max(0,needQty(it)-1);return{...it,orderedQty:n,qty:n};});
      const newAlloc=[...(order.allocItems||[])];
      const ex=newAlloc.find(it=>itemKey(it)===itemKey(item));
      if(ex){const i=newAlloc.indexOf(ex);newAlloc[i]={...ex,allocatedQty:(ex.allocatedQty||0)+1};}
      else newAlloc.push({...item,allocatedQty:1,orderedQty:1,qty:1});
      const next={...prev,[oKey]:{...order,allocItems:newAlloc,waitingItems:newWaiting}};
      onSaveAlloc(next);
      if(onArrive)onArrive(item,1,next);
      return next;
    });
  }

  // 把一件「可出貨」品項退回待補貨，並連動扣除備貨中心的到貨數（誤標到貨時使用）
  function returnToWaiting(oKey,item){
    setEditAlloc(prev=>{
      const order=prev[oKey];if(!order)return prev;
      const newAlloc=(order.allocItems||[]).map(it=>itemKey(it)===itemKey(item)&&it.allocatedQty>0?{...it,allocatedQty:it.allocatedQty-1}:it);
      const newWaiting=[...(order.waitingItems||[])];
      const ex=newWaiting.find(it=>itemKey(it)===itemKey(item));
      if(ex){const i=newWaiting.indexOf(ex);newWaiting[i]={...ex,orderedQty:needQty(ex)+1,qty:needQty(ex)+1};}
      else newWaiting.push({...item,allocatedQty:0,orderedQty:1,qty:1});
      const next={...prev,[oKey]:{...order,allocItems:newAlloc,waitingItems:newWaiting}};
      onSaveAlloc(next);
      if(onUnarrive)onUnarrive(item,1,next);
      return next;
    });
    setPacked(p=>{const n={...p};Object.keys(n).forEach(k=>{if(k.indexOf(oKey+"|")===0)delete n[k];});return n;});
  }

  function toggleNotified(oKey,idx){
    setEditAlloc(prev=>{
      const order=prev[oKey];if(!order)return prev;
      const ships=(order.shipments||[]).map((s,i)=>i===idx?{...s,notified:!s.notified}:s);
      const next={...prev,[oKey]:{...order,shipments:ships}};
      onSaveAlloc(next);
      return next;
    });
  }

  function revokeShipment(oKey,idx){
    setEditAlloc(prev=>{
      const order=prev[oKey];
      const revokedShipment=(order.shipments||[])[idx];
      const newShipments=(order.shipments||[]).filter((_,i)=>i!==idx);
      // 把撤銷的品項還回 allocItems
      const revokedItems=revokedShipment?.items||[];
      const newAllocItems=[...(order.allocItems||[])];
      revokedItems.forEach(ri=>{
        if(!ri.allocatedQty)return;
        const ex=newAllocItems.find(it=>itemKey(it)===itemKey(ri));
        if(ex){ex.allocatedQty=(ex.allocatedQty||0)+ri.allocatedQty;}
        else{newAllocItems.push({...ri});}
      });
      const next={...prev,[oKey]:{...order,allocItems:newAllocItems,shipments:newShipments}};
      onSaveAlloc(next);
      if(onRevokeShipment)onRevokeShipment(oKey,revokedItems,next);
      return next;
    });
  }

  function handleRecalculate(){
    if(!parsedCSV){alert("請先上傳訂單CSV才能重新計算");return;}
    const next=recalculateAlloc(editAlloc,parsedCSV,items,allocMethod);
    setEditAlloc(next);
    onSaveAlloc(next);
  }

  function handleIopenXLS(files){
    if(!files||!files.length)return;
    var arr=Array.from(files);
    setIopenXlsName(arr.map(function(f){return f.name;}).join("\u3001"));
    var pending=arr.length,mergedIg=JSON.parse(JSON.stringify(iopenData||{}));
    arr.forEach(function(file){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          var res=parseIopenXLS(aoa);
          var byIg=(res&&res.byIg)||{};
          var um=(res&&res.unmatched)||[];
          if(um.length){
            if(!Array.isArray(mergedIg.__unmatched__))mergedIg.__unmatched__=[];
            var uhave={};mergedIg.__unmatched__.forEach(function(u){uhave[u.orderNo]=1;});
            um.forEach(function(u){if(!uhave[u.orderNo])mergedIg.__unmatched__.push(u);});
          }
          Object.keys(byIg).forEach(function(ig){
            if(!mergedIg[ig])mergedIg[ig]={orders:[],customItems:[],totalSpend:0,needGift:false};
            var src=byIg[ig],tgt=mergedIg[ig];
            if(!tgt.orders)tgt.orders=[];if(!tgt.customItems)tgt.customItems=[];
            var have={};tgt.orders.forEach(function(o){have[o.orderNo]=1;});
            src.orders.forEach(function(o){if(!have[o.orderNo])tgt.orders.push(o);});
            var haveC={};tgt.customItems.forEach(function(c){haveC[c.orderNo+"|"+c.prod]=1;});
            src.customItems.forEach(function(c){if(!haveC[c.orderNo+"|"+c.prod])tgt.customItems.push(c);});
          });
        }catch(e){alert(file.name+" \u8b80\u53d6\u5931\u6557\uff1a"+e.message);}
        pending--;
        if(pending===0){
          Object.keys(mergedIg).forEach(function(ig){if(ig==='__unmatched__'||ig==='__reship__')return;var t=mergedIg[ig];t.totalSpend=(t.orders||[]).reduce(function(s,o){return s+(o.amount||0);},0);t.needGift=t.totalSpend>=3500;});
          onSaveIopen(Object.assign({},mergedIg));
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function exportCSV(){
    if(!editAlloc)return;
    const header=["IG帳號","客人姓名","客人總金額","訂單金額","商品","顏色","尺寸","款式","數量","狀態","出貨單號","出貨時間"];
    const rows=[];
    // 依客人總金額排序
    const sorted=Object.values(editAlloc).sort((a,b)=>b.customerTotalAmount-a.customerTotalAmount);
    sorted.forEach(o=>{
      const status=o.shippedAt?"✅ 已出貨":"可出貨";
      o.allocItems.forEach(it=>{if(it.allocatedQty>0)rows.push([o.customerAccount,o.customerName,o.customerTotalAmount,o.orderAmount,it.product,it.color,it.size,it.style,it.allocatedQty,status,o.shippedOrderNo||"",o.shippedAt?fmtTs(o.shippedAt):""])});
      o.waitingItems.forEach(it=>{if((needQty(it))>0)rows.push([o.customerAccount,o.customerName,o.customerTotalAmount,o.orderAmount,it.product,it.color,it.size,it.style,needQty(it),"⏳ 待補貨","",""]);});
    });
    const csv=[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="撿貨清單.csv";a.click();URL.revokeObjectURL(url);
  }

  // 整理顯示資料：依客人總金額排序，每個客人下面列各筆訂單
  const displayData=useMemo(()=>{
    if(!editAlloc)return[];
    const byCust={};
    Object.entries(editAlloc).forEach(([oKey,o])=>{
      const ck=o.customerAccount||o.customerName;
      if(!byCust[ck])byCust[ck]={account:o.customerAccount,name:o.customerName,totalAmount:o.customerTotalAmount,orders:[]};
      byCust[ck].orders.push({oKey,...o});
    });
    const custDone=(c)=>{const s=c.orders.some(o=>((o.shipments&&o.shipments.length>0)||o.shippedAt));const r=c.orders.some(o=>(o.allocItems||[]).some(it=>it.allocatedQty>0));return s&&!r;};
    const arr=Object.values(byCust);arr.forEach(c=>{c.done=custDone(c);let t=0;c.orders.forEach(o=>{(o.shipments||[]).forEach(s=>{const v=s.shippedAt?new Date(s.shippedAt).getTime():0;if(v>t)t=v;});if(!(o.shipments&&o.shipments.length)&&o.shippedAt){const v=new Date(o.shippedAt).getTime();if(v>t)t=v;}});c.lastShipTs=t;});
    return arr.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return b.totalAmount-a.totalAmount;});
  },[editAlloc]);

  // iOPEN 帳號比對不分大小寫（直播行 IG 大小寫可能與 hotsnet 帳號不同）
  const iopenLC=useMemo(()=>{const m={};Object.keys(iopenData||{}).forEach(k=>{m[String(k).toLowerCase()]=iopenData[k];});return m;},[iopenData]);
  const iopenCount=useMemo(()=>Object.keys(iopenData||{}).filter(k=>k!=="__unmatched__"&&k!=="__reship__").length,[iopenData]);

  // 搜尋：帳號 / 人名 / iOPEN訂單編號·出貨單號 / 已出貨單號
  const filteredDisplay=useMemo(()=>{
    const q=allocSearch.trim().toLowerCase();
    if(!q)return displayData;
    return displayData.filter(c=>{
      const hay=[c.account,c.name].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(q))return true;
      const info=iopenLC[String(c.account||"").toLowerCase()];
      if(info&&info.orders&&info.orders.some(o=>String(o.orderNo||"").toLowerCase().includes(q)||String(o.shipNo||"").toLowerCase().includes(q)))return true;
      if(c.orders&&c.orders.some(o=>(o.shipments||[]).some(s=>String(s.orderNo||"").toLowerCase().includes(q))))return true;
      // 品項搜尋：可出貨、待補貨、已出貨批次、客訂品項
      const hitItem=it=>dispName(it).toLowerCase().includes(q);
      if(c.orders&&c.orders.some(o=>(o.allocItems||[]).some(hitItem)||(o.waitingItems||[]).some(hitItem)||(o.shipments||[]).some(s=>(s.items||[]).some(hitItem))))return true;
      if(info&&info.customItems&&info.customItems.some(ci=>[ci.prod,ci.spec1,ci.spec2].filter(Boolean).join(" ").toLowerCase().includes(q)))return true;
      return false;
    });
  },[displayData,allocSearch,iopenLC]);

  const totalOrders=Object.keys(editAlloc||{}).length;
  const hasShipOf=(o)=>((o.shipments&&o.shipments.length>0)||!!o.shippedAt);
  const hasReadyOf=(o)=>(o.allocItems||[]).some(it=>it.allocatedQty>0);
  const shippedCount=Object.values(editAlloc||{}).filter(hasShipOf).length;
  const readyCount=Object.values(editAlloc||{}).filter(hasReadyOf).length;

  return(
    <div style={{maxWidth:640,margin:"0 auto",padding:"14px 14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <div style={{fontWeight:700,fontSize:16,color:C.ink}}>配貨</div>

        </div>
        <div style={{display:"flex",gap:6}}>
          {editAlloc&&<button onClick={exportCSV} style={{background:C.info,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,fontWeight:600,cursor:"pointer"}}>匯出清單</button>}

      {(()=>{const umAll=(iopenData&&iopenData.__unmatched__)||[];const liveN=filteredDisplay.filter(c=>!c.done).length;const shippedN=filteredDisplay.filter(c=>c.done).length+umAll.filter(u=>u.shipped).length;const ipmN=umAll.filter(u=>!u.shipped).length;const tab=(key,label,n)=>(<button key={key} onClick={()=>setCatFilter(key)} style={{flex:1,padding:"8px 2px",fontSize:12,fontWeight:600,border:"none",borderBottom:`2px solid ${catFilter===key?C.info:"transparent"}`,background:"transparent",color:catFilter===key?C.info:C.inkMuted,cursor:"pointer"}}>{label} <span style={{fontSize:11,opacity:0.8}}>{n}</span></button>);return(<div style={{display:"flex",borderBottom:`1px solid ${C.line}`,marginBottom:10}}>{tab("live","直播",liveN)}{tab("ipm","IPM",ipmN)}{tab("shipped","已出貨",shippedN)}{tab("reship","補寄",reshipList().filter(r=>!r.shipped).length)}</div>);})()}
      {allocSearch&&filteredDisplay.length===0&&<div style={{textAlign:"center",color:C.inkMuted,fontSize:13,padding:"20px 0"}}>找不到符合「{allocSearch}」的客人</div>}
      {(()=>{const umAll=(iopenData&&iopenData.__unmatched__)||[];if(!umAll.length||catFilter==="live")return null;const _q=allocSearch.trim().toLowerCase();const base=catFilter==="ipm"?umAll.filter(u=>!u.shipped):umAll.filter(u=>u.shipped).slice().sort((a,b)=>(b.shippedAt?new Date(b.shippedAt).getTime():0)-(a.shippedAt?new Date(a.shippedAt).getTime():0));const um=_q?base.filter(u=>String(u.orderNo||"").toLowerCase().includes(_q)||String(u.name||"").toLowerCase().includes(_q)||String(u.store||"").toLowerCase().includes(_q)||(u.items||[]).some(it=>[it.prod,it.spec1,it.spec2].filter(Boolean).join(" ").toLowerCase().includes(_q))):base;if(!um.length)return null;const pend=umAll.filter(u=>!u.shipped).length;return(
        <div style={{marginBottom:12,border:`1px solid ${C.warning}`,borderRadius:12,background:C.warningSoft,padding:"10px 12px"}}>
          <div style={{fontSize:13,fontWeight:700,color:catFilter==="shipped"?C.success:C.warning,marginBottom:8}}>{catFilter==="shipped"?"✓ 已出貨・未歸屬 iOPEN 訂單（"+um.length+"）":"⚠️ 未歸屬 iOPEN 訂單（待出 "+pend+"／共 "+umAll.length+"）"}<span style={{fontWeight:400,fontSize:11,color:C.inkMuted}}>{catFilter==="shipped"?"":"　查無 IG，勾選後可出貨"}</span></div>
          {um.map((u,ui)=>{const prods=(u.items||[]).map(it=>it.prod+(it.spec1?" "+it.spec1:"")+(it.spec2?" "+it.spec2:"")+((it.qty||1)>1?" ×"+it.qty:""));const cpk="um|"+u.orderNo;const allChecked=(u.items||[]).length>0&&(u.items||[]).every((it,idx)=>!!packed["UM|"+u.orderNo+"|"+idx]);return(

              </div>

                  {prods.map((p,pi)=>(<div key={pi} style={{fontSize:12,color:C.inkMuted,paddingLeft:4,lineHeight:1.7,textDecoration:"line-through"}}>· {p}</div>))}

                </div>

                <div>
                  {(u.items||[]).map((it,idx)=>{const isP=!!packed["UM|"+u.orderNo+"|"+idx];return(
                    <div key={idx} style={{fontSize:12,display:"flex",alignItems:"center",gap:8,padding:"2px 0",paddingLeft:4}}>
                      <span style={{flex:1,color:C.warning}}>· {it.prod}{it.spec1?" "+it.spec1:""}{it.spec2?" "+it.spec2:""}{(it.qty||1)>1?" ×"+it.qty:""}</span>

                </div>
              )}
            </div>
          );})}
        </div>
      );})()}
      {catFilter==="reship"&&(()=>{
        const q=allocSearch.trim().toLowerCase();
        const all=reshipList();
        const list=(q?all.filter(r=>[r.account,r.name,r.prod,r.recipient,r.phone,r.shipNo,r.store,r.address].filter(Boolean).join(" ").toLowerCase().includes(q)):all)
          .slice().sort((a,b)=>((a.shipped?1:0)-(b.shipped?1:0))||(new Date(b.createdAt||0)-new Date(a.createdAt||0)));
        if(!all.length)return(<div style={{textAlign:"center",color:C.inkMuted,fontSize:13,padding:"24px 12px",lineHeight:1.8}}>目前沒有補寄項目<br/><span style={{fontSize:12}}>在「直播／已出貨」分頁的待補貨品項旁，點「📮 加入補寄」即可建立</span></div>);

          style={{width:w||"100%",border:`1px solid ${C.line}`,borderRadius:8,padding:"6px 8px",fontSize:13,background:C.surface,color:C.ink,boxSizing:"border-box"}}/>);
        return(<div>
          {list.map(r=>{
            const askKey="ask|"+r.id,noticeKey="rsn|"+r.id;
            const askMsg="您好～您這次的訂單有一項商品缺貨未寄出：\n"+r.prod+(r.qty>1?" ×"+r.qty:"")+"\n\n這件我們會另外免費補寄給您，麻煩提供以下寄件資訊：\n・收件人姓名\n・聯絡電話\n・取貨門市（7-11 店名）或宅配地址\n\n造成不便非常抱歉，收到資訊後會盡快為您寄出！";
            const dest=r.method==="home"?r.address:r.store;
            const noticeMsg="您好～這是補寄通知\n補寄單號："+(r.shipNo||"（待填）")+"\n商品："+r.prod+(r.qty>1?" ×"+r.qty:"")+"\n已於今日"+todayStr()+"寄出\n"+(r.method==="home"?"寄送地址：":"至門市：")+(dest||"（待填）")+"\n\n再次為缺貨造成的不便致歉，感謝您的耐心等候！";
